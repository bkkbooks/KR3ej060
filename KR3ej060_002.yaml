body:
  text: 卷一痘源節録聶本痘乃胎毒藏於命門論胎毒者曰欲火曰恣食厚味曰降生之時口咽穢血此皆非確論也人之有生受氣於父成形於母則胎毒亦隨之而根於陽施陰受之始豈待成胎之後乃有是毒耶又曰胎毒藏於五臟故有痘出五臟麻出六腑之説不知胎元之成先有命門自命門之陽動陰靜而生水火木金土五月之後五臟六腑始有定形豈命門所藏之胎毒至此又將陰毒遷移於五臟而為痘復又將陽毒轉移於六腑而為麻耶夫命門體也五臟用也六腑又五臟之用也命門所藏者陰陽之氣也陰陽之氣藏於命門至深至密形氣俱泯必賴五臟六腑傳送時令之氣透入命門感痘之氣而為痘感麻之氣而為麻時令之氣有清有濁胎毒有順而無逆猶人之性有善而無惡痘有逆者時令濁氣之所變猶人之為惡氣稟習俗之所移也氣血節録聶本氣體天而親上血體地而親下痘之出也其高起之疱氣之位也上也氣宜充焉其四暈根腳血之位也下也血宜附焉疱尖而色白潤是氣充而居其親上之尊也四圍有暈而色紅活是血附而安其親下之分也此最吉也可勿藥而愈頂陷則氣反親下此氣虧而不能充也法當補氣四圍根腳無紅暈此血虧而不能附也法當補血此理猶易明也其有通頂紅色成血疱者是血反親上也此症最險必不能成漿至八九日後癢塌而死然此非血之獨盈乃由氣虧而失其居尊之常故血得以妄行而僭居其位也急宜大補其氣氣充則能統血血自不得泛溢妄行而疱轉白矣世人不明此理見其疱紅誤認為血熱用涼血行血之劑致令氣愈虧斃愈速不亦悲乎至於調治氣血其氣獨虛者固宜專補氣不宜補血蓋陽不能從陰陰愈長則陽愈消也其有血虛者多由胃氣損傷元氣不足所致蓋陰必從陽陽生則陰長也故必以胃氣為主補血必先補氣虛實寒熱節録聶本痘瘡之虛實寒熱與諸病有同有不同諸病有虛者元氣自虛也宜補也痘瘡有表虛有裡虛亦元氣自虛也宜補也此相同者也諸病有實者邪氣實也可瀉也痘瘡有表實有裡實此則元氣完固毒氣不能為害不可瀉亦不必瀉也此不同者也諸病有虛之甚者陰有餘陽不足則寒自虛生宜溫熱之劑痘瘡有虛之甚者亦陰有餘陽不足而寒自虛生亦宜溫熱之劑此相同者也諸病有寒自外入者外感是也當其在表宜發散之久而在裡郁為熱宜清解之痘出而風寒外襲宜溫而散之或外寒入里為吐瀉諸症亦宜溫之而已外不可發汗內不可清解也諸病有虛熱者補其元氣則熱自除痘瘡亦有虛熱當以補元氣為主而略兼解毒此同而有不同也諸病有實熱者血氣未虧邪氣壅盛單用寒涼瀉之痘瘡亦有實熱者稟氣強血氣盛而毒氣亦盛亦單用清涼解之此又相同者也聽其聲音觀其靜躁視其飲食之多少審其大小便之利澀三歲以上者診其脈之遲速洪微則虛實寒熱若黑白分矣闢解毒節録聶本痘與諸瘡不同諸瘡以解毒為主痘以血氣為主血氣能送毒以灌膿結痂則生血氣不能送毒以灌膿結痂則死解毒之藥多損血氣小兒稟賦強壯脾胃氣健飲食如常其氣血自旺自能送毒氣以成功毒不必解若稟賦素弱脾胃不強出痘時飲食減少或瀉或渴或腹脹或手足冷或氣短促或失聲或痘出不快或根窠不紅活或色白而頂陷或當灌膿而不灌膿或當結痂而不結痂皆由血氣不能送毒當速用溫補以扶胃氣助血氣倘用參耆歸術而力不及即加入丁香木香桂附等佐之不可添入芩連蒡翹等藥以損藥力此則欲解其毒而不可也至於血氣與毒氣並盛者脈必洪數痘或初出即帶紫黑或既出而稠密紅紫內症則煩悶躁渴小便赤澀大便閉結此屬實熱宜清涼之劑以解毒如大便火閉者量入酒蒸大黃微利之若毒氣雖盛而血氣未旺者以解毒為主而兼活血養氣則參耆歸術之類不可離也凡解毒者解之於既出之後是順其欲散之勢猶為近理解之於未出之先是遏其猛鋭欲出之勢其禍甚速痘未出時除升發微汗一劑外凡攻裡清表寒涼解毒之劑當禁之如砒巴勿令入口惟人參敗毒散能宣發毒氣出外為無害耳麻痘務外發初發無時不論是否當以升麻葛根湯為主痘疹避氣腋下狐臭氣房中淫液氣行遠勞汗氣溝糞濁惡氣婦人經候氣諸瘡腥臭氣砒硫蚊煙氣誤燒頭髮氣吹滅燈燭氣柴煙魚骨氣蔥蒜韭薤氣煎炒油煙氣醉酒葷腥氣麝香臊穢氣守禁忌生人往來罵詈呼怒對梳頭對搔癢勿掃地勿對荒言勿使僧道師巫入房勿對飲食歌樂可種印堂山根年壽無青暗之色者兩目有神者神情安逸者肥不見肉瘦不露骨者肉色緊微帶紫黑色者天柱端正手持物件有力者站立腳不倦怠者小便遠而長者腎囊緊小微帶紫黑色如荔枝殼者不可種兩目無神昏蒙倦怠者肉鬆如發麵樣者氣不均勻者面無喜色者形氣瘦弱者內有疳積者病後虛弱者吐瀉後元氣未復者渾身有疥瘡者生大毒正氣未復者聲音不亮不長者
