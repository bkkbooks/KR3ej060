body:
  text: 雜症卷三上發熱初起之時毒火方張宜乎身熱熱微則痘輕大則毒重必痘出熱始漸除出齊則熱宜退若當退不退速宜解毒初熱宜表散見標宜清解總以清利為主蓋便利則火從下泄切不可用補滯之藥痘正出時身不熱者吉微熱者亦無妨惟大熱者可憂出齊而壯熱蒸蒸尤可憂將來痘必稠密暈必紅紫乾枯宜調元化毒湯十去參耆俟痘暈不幹不紫始用參耆痘稠密身熱不退宜鼠黏子湯四十九起脹時發熱此時痘出皮膚熱宜退矣熱不退者內毒未解急宜解毒內毒未解發熱其症有二有毒氣壅盛不出者痘必紅紫乾焦兼之煩悶宜調元化毒湯若仍不退宜大成散百四三服此痘光潤起水即熱未盡退亦當更用補劑有元虛不能送毒而熱者其痘必淡白雖見點稀疏亦是留毒不可玩忽宜千金內托散十六灌漿時發熱無妨痘出齊則熱宜退至灌漿時身又宜熱身不熱則膿不成用藥宜補不宜涼結痂時潮熱熱不甚者乃元陽運化熏灼膿漿以成結痂之功所謂燒盤之症也不必服藥倘誤用寒涼退熱必變輕為重矣若漿清痂薄忽然大熱者餘毒將興欲發癰疽宜大連翹飲二十九弱者扶元解毒湯一百十熱退則餘毒解矣聶痘漿充滿初轉褐色此回水之候也忽然遍身大熱當先看臍之四圍及腰間如有小紅顆粒此乃出解毒疹也又名蓋痘疹宜宣毒透疹湯七三托之後用大連翹飲一劑即愈收結之時忽發大熱必是餘毒熏熾斷以解毒為主但大病之後元氣虛耗解毒中亦須顧其元氣此大連翹飲之類亦不宜過服也慎之痘後發熱症有數端有氣血回元而熱者悠悠潮熱不煩不渴不一二日氣還血復熱自退矣不必服藥有痘後元虧或久坐久視勞動傷神發熱者但安息調養不必服藥有感冒風寒發熱者必聲重鼻塞惡寒惡風宜補中益氣湯三十熱甚以升麻為君加前胡咳嗽加陳皮桔梗半夏南星炒芩不過一二服其熱自退有餘毒將發癰疽而潮熱者必其痘漿清痂薄熱而煩渴舌有黃苔遍身俱熱有一二尤熱甚者則癰之所在也宜大連翹飲弱者加參耆大便閉者加酒大黃必熱退痛止藥方可止毒清熱退即宜溫補以救元神聶發熱稍緩頭熱面不熱手足心熱手足背不熱精神困倦大小便利或胸腹熱飲食減少宜補中益氣湯渴加麥冬五味張有氣血兩虛而熱者其熱稍緩頭熱面不甚熱手足心熱手足背不熱精神怠倦大小便利其熱多在午後宜十全大補湯有餘毒不作癰疽特傳於肝肺而發熱者晝夜不息舌有黃苔血燥皮紅或十指搐縮用生地柴胡白芍炒芩殭蠶鉤藤牛子知母丹皮澤瀉花粉棗皮甘草附方三四日熱不退用千步土百草霜雞子白調敷臍上燃七寸香久水粉雞子白調搽太陽太陰並五心搽後用銅鏡二隻將兩手掌覆鏡上熱即退此方麻痘前後可用水粉雞子白作餅貼手足心雄雞生破開入麻油雄黃硃砂末乘熱敷臍上寒熱並作火動則熱火鬱則寒初熱時痘欲出而不能出氣血與毒火相攻故乍寒乍熱宜宣毒發表俟痘出自定用蘇解散八或加減升麻湯百十二痘已出寒熱並作宜調元化毒湯十行漿時寒熱並作內虛毒不能出也宜千金內托散十六落痂之後忽然畏寒畏寒之後復又發熱似瘧而實非瘧此乃氣血兩虛急用補中益氣湯三十加酒炒白芍法制半夏各五分一服立愈痘後寒熱並作內虛也寒多者理中湯頭痛初熱時頭痛輕多因感冒風寒所致用升麻川芎白芷防風藁本薄荷起發時頭痛亦是感冒風寒治同上收靨時頭痛身發熱是餘毒將攻目也宜解餘毒用羌活川芎連翹牛子防風荊芥黃芩黃連或加梔仁蒺藜蒙花柴胡痘後大熱頭目大痛餘毒上攻目疾將作也宜連翹飲二十九去木通車前滑石加升麻桔梗川芎薄荷白芷蒙花菊花目紅去當歸加膽草紅花生地必熱退痛止藥方可止附方生薑切開入雄黃末紙包浸濕煨擦痛處紫蘇煎服補頭腫痘後出外忽然頭腫兩目不開此非痘毒乃風寒也宜羌活防風湯二百草一嘔吐噦有聲有物謂之嘔有物無聲謂之吐有聲無物謂之噦發熱之初毒攻胃管故有是症吐而酸刺有聲吐訖反快精神不倦此毒逆上行因吐而毒亦解不必施治俟痘出吐自止痘痛吐泄總勿亂治吐無聲雖有內熱胃亦稍虛然不可驟用暖胃之藥恐閉其毒惟虛寒之甚者其見症必面青唇淡精神困倦不思飲食或食下即吐順快無聲宜參砂和胃散五噦乃毒火內郁張口似吐非吐最為危候若咽痛不能納物再加失聲必不救矣初見即宜解毒兼利小便用梔連二陳湯一百凡治乾嘔須利小便以引火下行若利之不下則必死矣補乾嘔土敗也宜定中湯用硃砂明雄黃各一錢為末真黃土一塊百沸湯泡蓋定少頃取出調前藥末服或用土水於房內熏之更妙此方兼治吐泄煩躁胃有痰熱作吐者必心窩作痛二便不利用桔梗陳皮半夏香附藿香木通車前茯苓甘草食積作吐者必腹中膨脹隱隱作痛宜升消平胃散四兼四苓散一百一或二陳湯加山楂神麯枳實上焦吐者由於氣中焦吐者由於積下焦吐者由於寒補飲水過多嘔吐此水逆也宜五苓散嘔吐黃水腹不痛者無妨腹痛則凶不痛由內無蓄熱必數日未進穀氣脾胃空虛本色形於津液稍與和胃扶脾飲食得進自無事矣若腹痛則毒留脾胃必大熱熏灼口臭唇皮硬舌有苔法宜寬脾解毒用陳皮厚朴山楂牛子慈菰石膏石斛甘草黃連木通白芷吐清水無妨此胃寒肝盛法宜暖胃平肝用砂仁藿香陳皮白朮茯苓白芍炙草煨薑煎服吐濃痰無妨痰雖火結吐則內寬不必施治吐臭痰難治胃中毒火甚也急與清胃解毒臭止或可救或痰中帶血者亦然用生地牛子慈菰人中黃天花粉見點時嘔吐最傷脾胃脾胃一虛必難起脹宜詳虛實調治之泄瀉亦然毒火上奔者其吐酸苦有聲吐訖反快精神不倦痘色必紅紫宜梔連二陳湯十九朱云痘粒尖圓紅潤姑少待之倘吐出有酸餿氣見點之後不甚爽快兼之腹痛此停食作痛而嘔吐也宜升消平胃散四胃氣虛損者其吐有物無聲不酸不苦吐訖困倦不思飲食痘色淡白宜參砂和胃散五起脹時乾嘔多凶毒鬱於中故也急宜解毒灌漿時嘔吐痘之成漿全要脾胃堅固吐則胃弱泄則脾虛方起脹灌漿之時一經吐泄痘即落陷急宜健脾溫胃用參砂和胃散痘後忽然嘔吐不思飲食形氣瘦削此虛寒也急用香砂六君子湯七十六加煨薑溫之若用升消平胃散必死附方煨薑蒸水服竹茹薑煮汁薑三片棗三枚同煎服胡椒五六粒研末燈心湯下大棗五枚去核內藏生薑紙包水浸透煨蒸水服泄瀉初熱作泄乃毒氣奔越從泄而解不必施治俟痘出其症自平然虛實寒熱之殊不可不辨泄而小便清利其糞或白或青食物不化有酸餿氣其泄滑溜自下無聲泄後疲倦此虛泄也宜術苓調脾散六或參朮散二十一服此不止用七味豆蔻丸二十二泄而小便赤澀其糞或黃或赤或黑其氣甚臭泄時有聲直泄而遠此熱泄也宜加味四苓散十二氣弱者加肉桂腹痛加木香後重出腸加升麻素有食積加厚朴陳皮山楂神麯木香胡連泄帶紅色加百草霜身熱煩渴加柴胡黃芩麥冬痘隱隱不出加升麻有一等自首至尾泄瀉不止而無恙者必結痂乃止但此必精神如故痘色紅活起脹灌漿無他變症初熱時泄紅乃熱鬱腸胃用黃連牛子慈菰人中黃一服立平初熱泄白乃脾胃虛寒用參朮散等方初熱泄赤黑水此臟腑已敗不治初熱泄下膿血如死肝豆汁此胃爛也不治見點時泄瀉嘔吐最傷脾胃脾胃一虛必難起脹宜詳虛實調治之見點時泄瀉毒氣奔越者痘色必紅紫宜加味四苓散虛寒滑利者痘色必淡白宜參朮散或七味豆蔻丸聶痘色灰白虛寒泄瀉手足冷宜回生丹五十一或異功散五十起脹時泄瀉其痘將陷急宜健脾用參朮散或七味豆蔻丸結痂時泄瀉無妨多是餘毒奔越不宜驟止但餘毒泄下者泄必有聲泄下或黃或赤而臭或直射而遠此熱注大腸餘毒因泄而解毒盡泄自止若不止用五苓散加牛子木通車前惟泄下青白滑溜無聲乃脾虛也宜參朮散或七味豆蔻丸附方大糯米罐內煮飯入胡椒末作餅貼臍五倍子末或灶心土熱醋和餅貼臍糯米入胡椒七粒煮粥食吐泄發熱之際或初見痘之時有毒氣作吐作泄者其吐必酸刺有聲神氣不甚困倦其泄必黃色臭穢雖吐泄交作而胸腹不痛此毒氣因吐泄而減所謂吐泄為順候而不必治者惟此一症耳吐泄交作胸痛甚見腹痛補邪在上焦則吐在下焦則泄在中焦則吐泄交作發熱至見點未透時吐泄宜柴苓湯即小柴胡合四苓散不可以為裡寒遂用丁桂薑附等熱藥不可以為裡虛遂用參耆朮蔻等補藥起脹灌漿時吐泄宜參朮散二之類以補脾起灌時吐泄最險惟初出及收靨後吐泄可治外受寒邪內傷寒物痘色灰自吐泄交作手足厥寒戰咬牙宜陳氏異功散二百草五吐瀉蛔蟲初熱毒火煽動蟲不能安故上逆胃口或因吐甚觸動其蟲出二三條無妨若滾滾而上則火灼內傷脾胃已壞不能療矣其後則臟腑寒涼蟲亦不安皆不可治世有以川椒黃連等藥安蛔者孰知其本既壞從定其標亦何益哉蛔從便出少則無妨多亦不救痘出時瀉不止蛔蟲從口鼻大便滾滾而出者不治結痂時吐蛔泄蛔俱不治痘後吐蛔或從鼻出皆由裡熱蛔不能安蓋熱毒上蒸則蛔從上出熱毒下迫則蛔從下出其症皆凶急用黃連止蛔湯百三五吐蛔方用雞子白調緑豆粉敷臍上大便閉初熱之時熱注大腸大便不通但可於解毒湯中加枳殼以破其滯黃連以滌其熱切不可用大黃芒硝斬關之藥致傷脾胃若祕結之甚加酒大黃少許發熱至報苗數日內大便閉用敗毒和中散三加酒蒸大黃一錢灌漿時六七日不大便悶塞作痛者宜清毒活血湯十四去參耆加淮牛膝二錢紫草歸各重用煎熟去渣入生蜜半盞服之再不通加酒大黃三錢微利之若仍不通用豬膽導法或蜜導法或用麻油灌入穀道或豬膏煮熟連汁服終不可用硝黃用未去油之豆蔻治閉結既能滑腸又不傷脾痘後有三五日或七八日不大便者不論有身熱無身熱看其元氣壯實即以大連翹飲二十九去木通滑石車前加枳殼熟大黃下之痘之首尾俱要便調痘後便閉恐留餘毒如無他症則必誤服辛熱以致陰血受傷不能滋潤宜潤腸湯百九有熱加知母石膏附方蔥一把蜜和抖餅貼臍綿花裹小柱頭蘸麻油皂角末納穀道小便閉初熱之時熱蘊膀胱故小便閉宜六一散九十二或於清毒湯中加車前木通滑石聶小便不利黃赤宜導赤散四十四不效用八正散五十二起脹時小便澀無妨津液上升於痘故也煩躁初熱毒火鼎沸五臟不寧宜生煩躁甚則其毒必甚宜解毒湯百十三服此煩躁少解即勿服俟痘出自定若仍煩躁不寧則毒氣壅盛必連服數劑其毒乃開聶發熱至報苗數日內煩躁譫語口渴飲水宜敗毒和中散三朱痘出未透二三日間煩悶燥渴小便赤澀睡臥不寧宜十神解毒湯四十七痘出稠密湧盛紅紫凸綻而潤澤口渴喜飲善飢喜食煩躁不安大便久閉小便赤澀可專用清涼解毒不必兼補養也故既出以後未收以前可以專解毒者惟此一症以其血氣與毒氣俱盛故也然亦百中之一二耳按此症宜四順清涼飲二百草二起脹時煩悶險毒郁不宣也宜解毒灌漿時大熱煩渴用參麥湯人參麥冬補灌漿時煩躁痘頂平塌色淡白漿不充此氣血不足也宜保元湯百七十加麥冬棗仁當歸白芍若自利不止而煩躁輕則陳氏木香散百三八重則異功散五十靨後發熱口渴煩躁宜麥門冬湯二百卅四痘後虛煩不眠宜竹葉石膏湯二百卅應中病即止不可多服凡晝日煩躁夜則安靜者此陽氣盛也宜人參白虎湯加梔仁晝日安靜夜則煩躁者陽氣陷入於陰也宜四物湯加梔仁外治方煩悶大熱不退用生艾葉一兩黑豆一攝白芥子三錢醋煮一滾為度共擂爛作餅敷心前連換數次口渴初起潮熱口渴無妨若渴甚則毒必甚治宜解毒不宜止渴毒火清渴自止起脹時口渴小便澀無妨津液上升於痘故也灌漿時口渴津液盡行於痘故渴渴亦要進辛熱以為作膿之計若痘好不必施治痘後大渴引飲必有餘毒餘火當用清涼解胃中毒火驚搐狂躁初熱時小便不長夢中或發驚悸急與定心散九十燈心湯為引否則驚搐之症至矣驚搐之症有目睛上吊口不能言者有身若反弓手足僵直者有目翻白雙手驚拳者有牙關緊閉者有口吐白涎者有舌頻出名蛇舌風者有大叫如鴉聲即死名烏鴉風者有嘴歪頭搖名黃蠍風者有十指驚搐名鸚爪風者此皆毒從心經過故有是症必痘出而驚乃定隨搐隨醒者吉醒而有汗者吉若面色青藍形神昏暗醒後目閉無魂不思飲食潮熱大作是惡候也昔人謂未痘先搐為順症豈其然乎驚搐只可扶持不可把捉恐郁其氣則立斃矣聶身熱至二三日後痘欲出不出煩悶驚搐狂言譫語切不可驚惶失措惟詳審虛實寒熱而治之此等症皆由毒氣在內不得宣發然症有不同不可不辨毒氣壅盛於內不能驟發於外而驚搐狂躁者痘影紅紫面赤唇紫聲音亮口氣粗身熱手足熱脈洪數宜清解散七以宣之大便躁結者用敗毒和中散三下之有內毒本盛外為風寒所束鬱滯不得出而驚搐狂躁者形色多同前症但聲重鼻塞或鼻流清涕脈浮數宜蘇解散八以發之此症多在寒涼之月或不謹避風寒者乃有之有血氣虛弱送毒不出而驚搐狂躁者痘影淡白在皮下不見紅活唇淡面白或帶青脈遲緩或譫語宜溫中益氣湯九托之分別既當一劑之後痘出而驚狂定矣有發熱二三日全無痘點形影忽然驚搐狀與急驚風一樣者此亦痘氣壅盛不能宣發所致宜用清解散七宣之痘出驚即定矣若醫者不知是痘誤作急驚以寒涼投之或以驅痰藥峻下之其兒必死蓋阻遏其毒使不得出而內攻也故未出痘之兒若遇此等症即當詳審恐是出痘不可作急驚治張驚搐必用鎮驚丸九十一又要用六一散九十二必使小便清長則熱退而驚自定驚搐用桃樹皮蔥子燈芯三味搗爛敷囟門肚臍及手足心一炷香久則驚自醒痘自出又於手足合骨二處燈火一灸以扯散風痰見點時痘未出齊亦常驚搐譫語皆由毒氣內壅俟痘出齊其症自定仍用鎮驚丸及定心散治之古謂先痘後驚為凶者以出齊後言也痘後驚搐乃毒化未盡火毒攻心也此時血氣已衰正不勝邪故曰痘後發搐是凶機搐而易退者尚可治若連綿不已則必死矣宜清神散火湯九十三或粉紅丸九十四補痘後胃弱飲食不化亦能發搐其人必面黃潮熱大便餿臭祕泄不調或吐利腹痛大便祕者宜四順清涼飲二百卅二泄者宜六君子湯驚搐燈火有用藥而驚搐不止者牙關咬緊藥不能進急用大燈心蘸蘇香油焠之頃刻即醒兩手曲池各一穴兩手虎口各一穴兩腳三里各一穴兩腳鞋帶各一穴兩腳虎口各一穴男從左上焠下女從右上焠下俱先手後足焠後抱兒睡一時看痘苗出見驚搐即止百發百中若煩躁頓悶不省人事則不可救矣倘遇元氣虛弱又兼大吐大瀉瀉出白色有酸餿氣宜溫中益氣湯倍加參耆朮苓痘出驚搐自止切不可用燈火蓋火能劫其有餘不能治其不足曲池在肘外曲橫紋盡處三里在膝外側下三寸鞋帶在腳背曲處虎口在大指次指相近之丫處按驚搐單焠男左女右手虎口一灸亦效亂語初起時亂語重毒氣迷心故也宜解毒清心降火兼之消痰用解毒湯百十三加花粉硃砂兼用定心散九十後生失陽方其發痘欲出不出狂言亂語此毒郁心經既不敢清涼以解毒又不敢驟補以助火急用剖雞方其痘自出狂亂自止方見腰痛凡欲補而不敢補其痘不能出者俱用此方立效見點之後未出齊之時常有驚搐譫語皆熱毒風壅所致治法見驚搐狂躁起脹時亂語險毒鬱於內故也仍宜解毒湯兼定心散灌漿時亂語此是血虧神亂宜歸脾湯以補血寧心為主切不可認為實熱妄用清心降火結痂時譫語只用補血安神痘後昏迷錯語此時毒氣已散元氣未復精神疲倦故昏昏喜睡即呼之不醒亦自無妨若連日不醒口中喃喃自言自語形如醉人每多妄説此邪熱乘心胞也宜導赤解毒湯百十四或安神丸百十五熱毒太甚狂言燥渴宜辰砂益元散五十四毒入心經狂躁不知人事宜豬尾膏五十五虛人禁用咳嗽初熱咳嗽無妨咳嗽多出肺經非肺受風寒即肺留毒火也火熏涎液液化為痰故有嗽治嗽以清火消痰為主初發用蘇解散八加黃芩花粉痘出齊嗽漸止者吉蓋毒已盡出於皮毛之外也治嗽消痰六日以前宜於清解方中加花粉七日以後宜於補托方中加款冬至於半夏南星則惟收靨時痰重者方敢用之起脹時咳嗽此時咳嗽宜減不宜加加則毒留於肺主險宜於化毒湯中加桔梗陳皮款冬花粉兼治之亦有先不嗽至六七日偶感風寒而嗽者表散其邪其嗽自止灌漿時咳嗽從前有嗽至此熱出皮膚嗽宜退矣若猶不退肺中尚有客熱宜於內托劑中加款冬陳皮桔梗倘嗽愈甚痰涎壅盛痘又無漿則毒火攻肺將變失聲危甚結痂時咳嗽痘若有痂無妨須用桔梗陳皮半夏款冬桑白皮茯苓炙草煎服痘靨無痂則凶痘後咳嗽此餘毒流入於肺肺熱生痰故咳嗽也宜清金降火若久而不止胸高氣喘則不治矣凡嗽用寧肺散百十六元氣虛弱風邪入肺而咳嗽者必乍寒乍熱宜補中益氣湯加桔梗陳皮半夏白附杏仁潮熱不息肝肺二經皆有風熱而咳嗽者宜柴胡赤芍炒芩梔仁胡黃連全蠍鉤藤川貝花粉桔梗陳皮夢遺咳嗽失音昏沉用生雞蛋一個開小孔瀝去黃白元參二兩取汁入殼內紙封固再用熟黑豆搗爛包蛋殼煨一炷香久取出退火氣服元參汁附方杏仁煎湯白附子磨服聲啞初熱聲啞不治丹田肺氣欲散也然有啼叫失聲者無妨又有感冒風寒失聲者必有嗽音濁不清宜甘桔湯加防風荊芥以疏其風寒則音亮矣起脹時失聲痘若起脹紅活則是內痘起脹閉塞肺竅俟內痘靨其聲自開或用甘草桔梗元參牛子山豆根黃芩煎水噙若痘色灰白倒陷聲啞則毒火內攻肺氣已絶必不能救聶云此症急用參麥清補湯十八兼用千金內托散十六或可救十之一灌漿時失聲毒陷內攻肺氣將絶然痘未甚陷急用內託大補元氣氣旺痘升其聲自復結痂時失聲痘靨無痂者必死其痘若好則或因氣弱而聲不亮宜用人參黃耆白朮茯苓訶子五味炙草或因痰壅肺道而聲不出宜用陳皮桔梗半夏款冬白附沙參茯苓炙草豁動其痰聲自開矣誤服鹿血以致失聲用雪梨汁磨象牙服喉痛初起喉痛難治此毒郁之甚其火上炎也宜敗毒和中散三又用理咽散百十六頻頻噙服但初噙一二日恐有火毒宜吐之聶咽喉腫痛首尾俱用利咽解毒湯四十二外用玉鎖匙四十三吹之痘出稠密毒火上炎咽喉必痛初見痘標之時不必專治咽喉惟有托痘一法倍加桔梗以利之起脹時喉痛或失聲內有痘也雖痛無妨仍用理咽散與噙但不可服此際臟腑空虛不敢用涼俟內痘靨痛自止有咽爛成坑者由前失於解毒毒火熏蒸所致痘好可救仍用理咽散與噙復用吹喉丹一百十八吹之若痘陷則難救矣灌漿時喉痛險外痘出齊則內痘起脹外痘灌漿則內痘當靨至此猶喉痛乃毒留於肺肺中毒火熏爛咽喉最危候也用牛子桔梗豆根射干黃芩甘草煎水噙或用利咽解毒湯與提漿藥相間服之外用玉鎖匙吹之若痘下陷則必死矣凡挫喉嗆水俱如此論落痂時喉痛凶毒火未化熏蒸胃口元氣又虛難於清解宜內服人參解毒湯百十九仍用理咽散與噙有一等虛火上炎喉痛者見鼻血條附方新鴨矢焙乾研細吹之苦參為末吹之硼砂冰片水粉為末吹之山慈菰磨水噙吞緑豆粉雞子白調敷喉外靛腳亦可嗆水痘有咽喉嗆水者順逆不同須分辨之灌漿時嗆水者喉中有痘也外痘成漿則內痘亦成漿此與前論喉痛少異壅於會厭門而嗆也蓋是門乃飲食所進之處既有所壅則飲水必濫入氣喉而發嗆若食物有渣自能咽下不犯氣道故不嗆也待外痘靨則內自痊不必用藥此症雖嗆水其喉不甚痛若痘未行漿而喉先嗆水痛甚此則毒氣壅塞宜用前治咽喉方治之喘急初熱喘急毒氣內壅也宜解毒八九日喘急無妨內痘升脹阻塞氣道也收靨時喘急凶痘若塌陷氣將絶也補喘有虛有實虛者氣息微而短實者氣息大而長皆肺病也初熱或痘初出噴嚏鼻流清涕發喘者此風寒客於肺也宜參蘇飲傷食穀氣蒸而為熱上乘於肺發喘者宜平胃散加山楂神麯麥芽吐後發喘者胃虛不能制火也宜六君子湯泄後發喘者元氣下陷虛火上壅也宜補中益氣湯泄瀉日久內虛腹脹作喘者宜陳氏木香散百三十八痘漿半足而倒靨喘脹者宜保元湯一百七十加防風調獨聖散用穿山甲炒朱麝一分痘密以致鼻塞口中氣促似喘者此非喘也不必施治雜症卷三下腹痛朱發熱之際或初見痘之時吐瀉交作胸腹痛甚吐則有餿酸之氣瀉則有淡白之色亦有餿酸氣此感寒而停食也宜升消平胃散四加羌活五分一服立愈聶無羌活聶停食腹痛者其痛必多急疾啼叫必甚多在臍以上痛面必青白唇淡手足冷宜升消平胃散毒氣腹痛者其痛稍緩有痛有止多在臍以下痛或連腰而痛面或紅色唇紫手足不冷宜敗毒和中散三大便燥結加熟大黃微利之張宜敗毒散九十五有平日腹痛者至發痘之時腹痛亦發此不必治痘出其痛自止見點三日內腹痛發厥痘出不快用蟬蛻去翅足為末每服一錢痘出自定見點時腹痛煩躁宜芍藥防風湯九十六若大便閉結宜大黃化毒湯九十七灌漿時腹痛最險此時毒出皮膚不宜痛矣痘陷漿清者毒入內攻也若膿漿滿足則為風寒食積所致宜升消平胃散或一向未大便因燥糞作痛者用膽導法便通則痛止結痂時腹脹而痛漿不滿痂不厚此內留餘毒宜牛子連翹山楂神麯厚朴陳皮香附木香白芷炙草炒芩有熱加前胡若漿濃痂厚則為積滯脹痛宜前方去連翹黃芩加蒼朮砂仁大腹皮方靨之時漿清痂薄忽然腹脹而痛煩悶不寧此餘毒入里最為危險未幾漸加喘急手足厥冷則不治矣速用雄黃解毒丸九十九痘當靨時忽然腹痛其痛著在中脘此熱毒凝滯於血作痛也宜消毒散血湯二十八此症極少痘後口噤僵直冷汗如雨繞臍而痛痛定汗止此風寒入胃宜升消平胃散加鉤藤木香一服立平痘後吐瀉交作腹痛宜正氣散九十八大便閉結腹痛用白芍二錢厚朴錢半陳皮七分甘草三分大黃一錢痘後腹中飽脹不思飲食時時作痛此必誤服食物或過服熱藥致餘熱滯積作痛其腹必有微熱宜消導解毒用蒼朮厚朴陳皮半夏木香香附砂仁牛子連翹山楂神麯川芎前胡炙草腹痛時腹中滾起數團痛定團亦平此蟲痛也宜平胃散加使君子肉苦楝皮胡黃連服後瀉出蛔蟲永不痛矣附方腹痛用門斗灰燈芯湯泡服將娘鞋烘熱尉痛處酒麴薑汁麻油合餅貼臍腹脹初起腹脹險中後難救俱是熱鬱脾胃不能發泄而然也治宜升發解毒兼消導之腹脹大便閉用枳殼湯百三二腹脹小便赤澀用四聖散百三三加澤瀉豬苓車前此皆痘色紅紫實熱閉結者方可用若二便清利手足冷痘色淡白脈微緩此臟寒不能發毒而脹也宜理中湯百三四或異功散五十痘若陷伏不起喘急神昏則毒入內攻治之無益矣起脹時腹脹痰鳴毒內攻也必死附方炒鹽布包尉臍艾葉柑子葉薑蔥抖爛加麻油炒熱布包尉臍生薑切開入雄黃末紙包煨貼臍心胸痛初發心胸突起作痛此毒填胸膈凝而不出多凶急宜解毒湯百十三多用桔梗陳皮加鬱金痘出痛定可救誤服熱物或傷風寒與素有結痰者無妨痘出痛自止痘後心胸痛此熱蓄心胸故在臍以上痛用鬱金陳皮半夏桔梗黃連梔仁玉竹木香香附厚朴白芷連翹心胸痛腰痛豆豉一碗胡椒一錢共搗爛生薑汁調勻炒熱敷胸腰二處腰痛最危痘毒發自命門初起腰痛命門傷也大凶若連背脊尾痛尤凶急與扶腎用人參生耆當歸元枝牛蒡連翹續斷故紙杜仲枸杞知母炙草煎服外用生雄雞背上破開取出腸肚燒酒一杯噴雞腹內一法留腸肚入麻油雄黃末一法先用麻油燈火於痛處二灸然後敷雞乘熱敷腰緊縛一炷香久其雞即臭不可聞須用二三隻痘出痛止可救出齊腰猶痛更凶須用人參豬尾血加冰片少許與服人參補氣尾血從髓而來是入腎者也冰片直射臟腑其方最妙服此痛止可救其後總以內托補腎為主若諸方不效則必死矣至十三四日腰痛者則是血虛補血養腎可保無虞補發熱腰痛惡候也宜先服人參敗毒散次服五苓散加獨活然後調理氣血或有可救附方艾絨麻油炒熱敷痛處熱麻油揉痛處尻骨痛用芙蓉根馬鞭草搗爛炒溫敷痛處寒戰咬牙小兒素受風寒當發熱之際毒出而風寒亦出固有惡風惡寒者所謂傷風則惡風傷寒則惡寒也表散其邪自愈若寒甚作戰栗則寒出於肺六日以前多屬肺熱熱極生寒也肺熱之症必唇紅脈數痘紫舌苔治宜清毒涼肺不可誤投辛熱七日以後多屬肺寒肺寒之症必唇淡脈緩痘白治宜辛補以回陽咬牙之症亦如此辨但咬牙屬胃獨見症者用藥宜從其經此二症初熱時難治八九日後可治蓋至此毒出臟寒用補可救也按發熱初出時寒戰者此毒邪欲出不出邪正相爭似寒而實熱也宜柴葛桂枝湯二百卅六加黃耆痘正出時外為寒邪所襲而寒戰者法同上去人參加荊芥起脹時及灌漿時寒戰咬牙內臟空虛俱急用桂附理中湯聶痘出八九日漿滿而寒戰咬牙此真氣外發內臟虛寒也宜建中湯二十五一服立止甚者不過二服收靨時寒戰咬牙治同上按此二症均宜大補氣血但寒戰者補氣為君補血為臣咬牙者補血為君補氣為臣聶或謂寒戰咬牙之症有熱有寒如痘色紅紫齊湧焮發身熱煩躁作渴大便閉小便赤澀脈洪數者熱也蓋胃熱則咬牙肺熱則寒戰也如痘色淡白皮薄頂陷身涼惡寒大小便利脈沉遲者寒也蓋胃寒則咬牙按肝腎虛寒亦有咬牙之症肺寒則寒戰也此説當矣然此症屬寒者十九屬熱者十一見於七八日前間有屬熱者見於七八日後屬熱者寡矣補痘已出齊而寒戰咬牙者只用攻漿之藥漿足其症自退若漿已充足手足微有動意非寒戰也乃漿滿作痛吉兆也坐立戰搖痘後坐立戰搖氣血兩虛也宜八珍湯發癢痘毒有氣無形必借氣以送之血以載之頂尖而圓者其氣上升也有紅暈者其血下附也分清氣血之時痘多作癢及氣血各定其位則氣上升以化毒血下附以養漿其癢自定痘雖忌癢惟初出時癢不忌按初出癢甚者乃皮膚閉密邪火欲出而不能也宜升麻葛根湯去白芍加赤芍防風桂枝淡豆豉灌漿時作癢乃毒氣欲化不化擾攘於皮膚也最為凶候其由來有數端氣虛不能化毒而癢者其痘必白色頂陷皮薄漿清或暈腳淡紅精神困倦二便順利宜參耆實表湯卅二或千金內托散十六或參歸鹿茸湯十五俱倍加參耆或異功散五十助其長漿其癢自止血熱作癢者其痘紅紫口渴宜清毒活血湯十四倍加參耆泄瀉後正氣內虛邪氣外實作癢者宜調元托裡湯百五六邪穢觸犯作癢者宜平和湯十二外用檀香紅棗燒煙燻之痘後發癢抓破成瘡者此血熱也用黃柏生紫草甘草生牛子銀花生地紅花共煎油搽之補因風寒所感發癢者用避穢香大黃蒼朮加小棗茶葉燒煙燻之無因而發癢者當視瘡形治之瘡干而癢宜養血潤燥四物湯加防風黃耆荊芥桂枝牛子升麻甘草瘡濕而癢宜補氣除濕四君子湯加防風荊芥黃耆桂枝牛子將靨作癢者正氣復也不必服藥痂落後瘢肉凸起作癢者宜荊防敗毒散痂落後其瘢紅多白少微癢宜保元湯百七十加白芷防風一二劑即止勿服附方痘癢用蟬蛻二十個去翅足水煎服立止荊芥穗末紙捲成條燈上燃之按滅隔一二層紙於痘上焠之荊芥葉千年霜燒煙燻之生薑搗爛燒酒炒布包尉之遍身痛初熱遍身作痛此必平日傷風傷寒至痘發之時一齊攻作所以痛也祛風發汗痛自止矣灌漿時筋骨疼痛無妨痛而紅腫者是餘毒也痛而不腫者是風疾也且餘毒發於收結之日決不發於灌漿之時此時作痛而不紅腫必為風寒所襲秋冬時多有此症用薑蔥灰面燒酒炒熱尉之內用生耆當歸川芎白芍防風鉤藤石南藤白芷骨碎補續斷薄桂五加皮殭蠶蟬蛻弱加人參酒煎服服後運擦痛處令藥性行遍身疼痛用黑豆一升煮熟擂爛敷腰上痘痛痘痛者膿漿盡升此吉兆也痛甚者白芍磨酒服少許立止然亦不必施治手足痛初熱手足痛凶乃毒氣留滯筋骨不得宣於肌肉氣血又不能活宜桂枝芍藥湯百二一失此不治日後雖生必致風攣亦有素受風寒作痛者以薑蔥灰面共搗爛酒炒熱敷擦痛處或加蒼朮八九日漿行痘痛是其常也若筋骨痛者則是風疾姑置之俟痘愈然後以驅風兼行氣血於四肢之藥治之痂後亦然痛只一二處肉中如有核者此療結於內也用艾火或燈火灸之其痛立除附方黃豆腐切片敷痛處桑白皮搗爛敷痛處足底痛用銅鑼一面將兩腳踏其上一時痛止手心痛初熱手心痛用一芍散手足搖手足屬脾胃初熱手足搖乃風生脾胃驚風死症補起脹時手足自搖肌肉自動此氣血虛也宜十全大補湯手足牽引灌漿時手足牽引無妨痘若起灌或為血虧或為肝風宜祛風滋血湯百二二結痂時手足牽引或十指搐縮或聳肩搖足點額搖頭皆是肝經有風宜用黃耆當歸白芍為君茯苓鉤藤白殭蠶糯米炒天麻炙草點額搖頭加川芎蟬蛻全蠍去首尾硃砂手足拘攣結痂時手足曲而不伸或伸而難曲艱於轉動此是氣血兩虛也用人參黃耆當歸川芎白芍生地白朮茯苓丹皮續斷骨碎補虎骨鉤藤炙草官桂酒煎服骨內痛而不腫者是風疾也前方加防風五加皮南藤瘛瘲痘後忽發瘛瘲遍身青紫乃血氣既虛肌膚未固倏感風邪故也用蟬蛻末一錢生薑薄荷汁調服令汗出愈手足冷初起陽氣攻毒未達四肢冷亦其常痘出將齊手足乃溫但冰冷過肘膝則不治矣蓋陽氣幾絶也急用參耆桂附歸芍鹿茸大補氣血或有可救兒體素弱或吐泄後元氣愈虧不能勝毒痘隱不出汗出如珠四肢厥冷似睡非睡眼露白症同慢驚此危候也急用附子乾薑各四錢陳豆豉三錢丁香一錢小雄雞一隻共搗爛燒酒略炒敷臍上及二足湧泉穴連換二三次痘出諸症自退泄瀉加灶心土結痂時手足冰冷陽氣將絶不能行於四肢也痘後手足冷六脈沉細元氣虛也宜調元生脈湯百二十甚加附子按足冷有火鬱於上而然者清上則火降足自溫矣宜參蘇飲去木香加厚朴梔仁又按厥冷一症有陰陽之辨焉陰厥唇淡面青氣冷身涼痘色灰白塌陷陽厥煩渴喘促痘色焦紫所謂熱深厥亦深也大便血初熱大便血此熱注大腸也用川連炒牛子炒黃芩炒厚朴香附枳殼紅花生地地榆木香百草霜煎服或用香連丸亦可此方首尾俱可用一方用黃連牛子慈菰人中黃一服立平起脹時大小便血此毒攻臟腑也不治急用地榆大黃紅花根共為末燒酒調敷尻骨三炷香久連換三次血止或可救灌漿時便血無妨腸胃有痘痘潰故下膿血勿作痢治宜五苓散加牛子血餘結痂時瀉下膿血此內有蓄熱或內痘潰也下儘自愈不必止澀痘後大便血此熱滯大腸也急用涼血地黃湯百二三加秦艽槐花地榆痘後瀉膿血亦毒從泄解不必止澀或便不順利作後重用黃連解毒湯一百四或和中湯百五素有積熱腸鳴腹痛裡急後重宜先與調胃承氣湯百六以泄其毒次用芩連湯百七或香連丸百八久而不止用韭菜白豆豉梔仁肝經出痘大便下血眼紅氣粗丹痧滿面紫黑不起用白頸蚯蚓七條焙乾瓜蔞仁二十粒去油杏仁十五粒去皮尖藤茶煎汁調餅貼臍一炷香久連換數次諸症自退胃經出痘瀉血用雞子白調緑豆粉敷臍下小便血初熱小便血毒壞命門故膀胱溺血凡見此症痘必焦枯腹必作脹八九日間必死痘初報苗以及出齊之後如遇吐血及大小便血俱屬可慮起脹時小便血毒攻臟腑不治痘後小便血此熱滲膀胱也小便必短澀而痛用牛子銀花木通車前瞿麥滑石赤苓豬苓澤瀉又方用苦楝皮入豬尿胞內煮熟服立效然必先服前方數劑後乃以此收功一法用涼血地黃湯百二三加木通滑石車前吐血初熱吐血血鮮但一二口無妨若不止宜犀角地黃湯八十六起脹時吐血亦宜清毒涼血引火下行若吐不止多凶黑血則必不救但一二口者可救痘後吐血熱蘊於胃也急用涼血地黃湯百二三加知母石膏童便香附血止則生不止則死按痘未盡出過用寒涼傷其脾氣致血妄行吐衄昏倒痘色淡白陷伏宜理中湯衄血初熱鼻出血此邪循肺竅將達皮毛也隨出隨止者不必治不止者用犀角地黃湯八十六外用發灰散吹之三十八一方用絲線緊扎小指甲邊扎盡其指其衄立止男左女右聶痘有衄血此毒氣外泄非惡候也但用發灰散或清肺湯三十九切不可峻用寒涼如犀角生地山梔生三黃之類冰伏其血必為大害世人不明此理一遇衄血咽喉口舌等症即認為實熱投以寒涼因而死者比比也有一種痘出稠密毒火既盛血氣又弱以致虛火炎蒸或煩渴或咽痛或鼻時出血難任溫補必不能成漿結痂年長嗜欲久開之人多有此症最為難治時醫見其多熱率用清涼如犀角地黃之類鮮有不死宜參麥清補湯十八頻頻服之少年虛火上炎血不歸經吐血衄血急取白果擂水服後用柏樹上寄生一兩山梔根皮二兩共搗爛敷臍連換三次吐衄自止若未止用犀角地黃湯痘後衄血熱流於肺也急用涼血地黃湯百二三加黃芩茅花一人口鼻出血數碗以韭菜汁半碗服之愈補靨後餘毒乘脾脾傷不能統血而衄宜參朮散二十一加白芍黃連酒炒微黑眼出血初熱眼出血此毒氣橫肆上攻暴烈於精華也後必不救耳出血初熱耳出血耳為腎之竅毒氣橫烈腎氣已敗故血逆上攻出於其竅必不能救耳膿血痘後耳內腫痛流出膿血俗名蠶耳須先用棉花攪淨後用黑砂糖水調少許滴清耳內立愈戒勿抓挖痘瘡血血有從痘瘡出者肉分空虛元氣走泄也必死諸竅出膿諸竅出膿無妨行漿之際有眼耳鼻出膿口吐臭膿者皆由其內有痘不能結痂潰而出膿不必施治內痘成膿則毒化矣中風發熱之時腠理開張或中風邪忽然直視張口吐舌不能言宜參蘇飲百三十或消風散百三一或一時無藥則以薑汁灌下且用推拿法又用桃樹皮薑蔥豆豉川烏共搗燒酒炒溫敷臍及囟門二處汗出自愈痘正出時忽然直視牙關緊閉此調護不謹為風寒所襲也且勿輕用驅風峻藥宜薑附湯十三濃煎灌下一二杯出微汗即愈起脹灌漿痘後有中風之症俱用人參黃耆乾薑附子桂枝麻黃殭蠶炒防風炙草牙關緊閉用燈火於兩牙交穴各一灸其口自開灌膿時其痘皆好忽然噤口直視痘皆變為瓦霜色是中風也不必驚慌急用生薑汁灌下仍用乾薑附子官桂喉中有痰加半夏溫服令出微汗即愈中痰發熱之時毒火熏蒸痰涎壅盛滯於咽喉不能言語狀若中風但喉內痰鳴是中痰也最為危急須以生薑汁灌下若不能進藥用鴨翅毛透入喉中攪出痰涎令其自吐然後用陳皮桔梗半夏南星花粉天麻竹黃硃砂濃煎服或加礞石或用鎮驚丸九十一薑汁引此急則治其標也若痘欲出不出急剖生雄雞燒酒噴敷臍連用二三隻將痘托出或可救凡痘欲出不出此方最妙多痰灌膿前後數日有痰用白附子熱水磨服切不可用二陳湯恐燥陽明孤陽無陰不能生化至收靨時用之無妨痘出稠密漿不甚滿至回水結痂時飲食減痰液多宜養胃開痰湯二十四流涎灌漿時口角流涎不止乃胃弱也急用參砂和胃散五否則胃弱不能行漿恐變咬牙之症則難治矣時值瘧疾復出痘瘡口吐白涎咳嗽失聲用生薑切片包大附子煨再取薑汁和當歸生地白芍共搗爛敷臍中一炷香久汗初熱時身有微汗其毒乃出有汗則不宜發散然有自汗有盜汗痘未出之先縱有自汗盜汗皆不可驟止以閉其毒痘既出後或盜汗自汗之甚恐表虛後難成漿急宜斂汗固表用人參炙耆當歸白芍桂枝麥麩炒身冷惡寒用人參炙耆當歸川芎白芍肉桂附子炮薑炙草起水後加白朮淮山服此仍大汗如珠寒戰不已昏沉煩渴此亡陽症也不治痘前腠理開通毒乃不閉故宜有汗痘後腠理緊閉風邪方不能入故不宜過汗若有自汗盜汗之症乃表虛也宜用人參炙耆炙草當歸黃連炒桂枝煎服又方用當歸炙耆炙草生地麥冬黃連炒麥麩入豬心內煎服痘後身涼冷汗不止形氣雖實而精神稍疲此陰陽交戰宜歸耆湯二十三有過服熱藥汗出不止者必漿濃痂厚痘出腎經腰腹絞痛吐瀉交作手足冰冷大汗如注此陰盛陽衰最險急用乳香沒藥人參各一錢作丸納臍中再用艾絨炒熱敷丸上不食初熱時熱鬱於內必作飽不思飲食此時不可驟用暖胃藥以滯其毒若無泄瀉痘色紅活雖出齊後不食亦無妨俟水足漿行毒氣盡出腸胃無熱自然思食不必施治惟吐瀉後痘色淡白不振乃胃弱不食也用人參白朮茯苓砂仁丁香陳皮山楂神麯炙草煨薑引灌漿時不食凶八九日前毒未出盡不食無妨至此毒宜盡出內臟空虛當大進飲食矣而猶作飽脹者必毒留內滯脾胃已敗急用人參黃耆山楂白朮丁香肉桂煨薑等藥大暖脾胃痘起有膿飲食稍進可治不然血氣無所資矣痘雖起脹亦必陷靨而死結痂時同痘後不食亦凶有脾胃虛寒不欲食者必唇舌俱白身涼精神困倦懶言用人參黃耆當歸川芎白朮茯苓丁香肉桂砂仁乾薑山楂麥芽有餘熱留滯脾胃不欲食者必舌心有苔腹脹微熱以消導解毒為主兼與補脾有一向能食忽然聞食則嘔必傷食也失治必成疳勞用平胃散加三稜莪朮枳實良薑問其所傷何物即以原物為引能食痘雖焦黑而飲食如常此毒火內熾易於克化也必死然總看痘色吉凶食與不食不足定其生死飲食倍進痘後飲食倍進面赤喘急二便祕澀內熱也不急治必變生他症宜四順散二百卅二噯氣初熱時噯氣此熱鬱於胃欲出不出故噯也用香附陳皮桔梗茯苓木香山楂生薑引不止加豬苓澤瀉木通導熱下行結痂時咳逆俗呼厄絡此胃氣上越也取真黃土置鼻邊聞之立止昏睡結痂時至痘後昏睡氣血盡送於外元氣未復故昏昏而睡呼之不醒醒亦復睡不必驚疑元氣復自安寧矣若連日不醒口中哺哺自言自語形如醉人每多妄語此邪熱乘心胞也宜導赤解毒湯百十四或安神丸百十五腫脹痘出齊後面目腫脹而痘不起此氣血虛弱不能攝毒故其毒散漫妄行肉分也最為危候宜參歸大補湯三十三此症與十三逆症形如瓜瓠者相似但不若瓜瓠之甚耳灌漿時頭面身體腫脹無妨毒攻皮膚宜其腫也但要痘起惟肉腫而痘不腫者危痘後浮腫見後陰囊腫脹陰囊腫脹乃腎毒外泄於膀胱也吉至痘收齊自退若猶不退宜蒼朮茯苓豬苓澤瀉木通車前滑石牛子銀花瞿麥以退膀胱之熱補有厥陰肝經之熱下注而發腫者宜小柴胡湯加青皮木通山楂按囊腫治法有三一疏肝一清肺一泄膀胱附方石燕醋磨濃汁搽之椒鹽蔥白地膚子煎湯熏洗桑白皮搗爛麻油炒熱包定目閉初起目閉不治精神已衰不能送毒急用內托之劑痘出可救痘將出時忽為風寒所束目閉宜升提達表之藥以祛寒發痘或用推拿法疏通寒邪再用生雞剖開燒酒噴之敷臍上痘出目自開八九日起脹目閉乃眼胞腫脹不能開也元氣內固名曰封倉最吉驟開則凶十三四日痘毒已退目宜開矣而仍閉者毒未盡化也亦凶眼露白眼露白凶目為五臟精華所萃睛若上吊不能運動此元神將散又焉能送毒乎加以失智無魂無論前後皆不治必欲治之總以內托扶元為主惟痘前發搐眼露白搐後人醒即定者則以風論痘出其症自平鼻淵痘後鼻中時時流涕臭不可聞此熱毒乘肺也用絲瓜近蒂五寸黃芩梔仁牛子甘草煎服外用絲瓜藤燒灰吹鼻又以絲瓜灰調酒服數日自愈痘瘡入目痘出時眼紅不敢開眼中有痘也任白珠黑珠俱無妨只用清肝丸百五一磨水蒸出藥性再用胭脂水研爛入藥水頻頻點之又以藥渣敷眼胞數日毒散痘收自不傷目單用胭脂水點入亦可附方眼內有痘用青魚膽或鯽魚膽鯉魚膽狗血皆可點之鮮魚血點之外用燈火灸手掌心防痘入目痘發之時恐痘入目以油胭脂塗其眼眶或以牛子為末蜜調敷其四旁或白芥子為末水調敷其足心引熱下行皆良方也一法牛蒡子為末塗兒囟門痘毒攻目痘毒入目有赤腫作痛不能開者有翳膜遮蔽不能視者此非有形之痘瘡乃無形之痘毒也痘瘡發於口舌咽喉者有之外靨則內亦消至於痘毒入目必在收靨之時或還元之後以此為辨當從容調治不可純用寒涼致生大患又不可用寒涼之藥點洗宜清毒撥翳湯四十五氣血兩虛毒火內盛漿不能成或不能滿至收靨時上攻兩目始焉身熱頭更熱頭疼兩太陽更疼細看眼胞必腫緊閉不開熱淚長出皆膿黏滯急用清毒保目湯七十四連服二三劑失此不治毒火愈炎攻脾則兩眼胞紅腫攻心則大小眥紅腫大痛攻肺則白珠紅絲障蔽日夜啼叫痛苦異常目不由是壞乎從前誤服補劑至收靨時毒火上攻兩目急用清毒保目湯紅腫太甚翳膜遮於肝肺之間急用清毒撥翳湯連服一二劑自然翳退痘翳用蟬蛻豬肝散七十五每日清晨服之兩月之內可消一半若性情和平百日可愈切忌煎炒辛熱等物未出痘之先一兩月內兩目羞光及出痘收結後兩目緊閉急用乳酥油搽兩眼縫潤其枯滯自開看其兩目有紅絲纍用清毒保目湯一劑不愈再用一劑以解上攻之毒火如有翳膜遮蔽即與清毒撥翳湯緩緩磨一兩月之久其翳自退無紅絲纍不必用藥張紅腫不能開者宜洗肝散二百四有翳膜者宜撥雲散二百五眼合羞明宜羌菊散二百六或涼肝明目散二百十或望月散二百十一羞明障翳宜膽草散二百七痘毒生翳宜兔糞散二百八或兔糞丸二百九見風太早淚下汪洋四弦紅赤生癢年年復發宜祛風明目散二百十二唇口舌面唇與舌五臟皆通熱毒輕者唇口如常口亦不臭熱毒盛者至二三日間唇必紫黑或硬或裂口氣臭急宜解毒為主唇硬裂者尤凶宜清脾胃之火解毒湯內須加石膏又以石膏甘草牛子連翹煎水時搽唇上口臭者治同滿口俱白生口瘡者用清胃散百二四敷之痘後同聶痘有口舌生瘡者或是熱毒或是虛火當以痘色辨之切不可概認為實熱純用寒涼如痘色紅紫湧盛者熱毒也宜清上飲四十痘色淡白者虛火也宜參麥清補湯十八外用赴筵散四一搽之或口舌有痘腫礙痘靨自愈不必治之治亦不效朱痘出稠密口舌必多破爛但不宜作臭穢氣在長漿之際極力攻漿不必憂口舌之破爛倘毒火內盛牙床口舌糜爛臭穢急於清毒活血湯十四中去人參加熟石膏花粉一二劑臭穢自除在回水之候急用大連翹飲二十九去木通車前滑石加黃連酒炒熟石膏薄荷麥冬花粉桔梗連進一二劑服此臭穢不除愈見破爛變成牙疳再加胡黃連蘆薈煨為末入前方內調服舌有白苔其毒已重黃苔更重急宜解毒變黑則難救矣舌卷囊縮乃火鬱心經症亦難治然有啼叫火動致舌卷不能食乳者其舌下之筋必弦緊須用指頭從筋上重按之使舌筋不弦自不卷矣小兒不能言醫者不可不審也舌有黑點舌上生疔也必主遍身痘皆焦黑而死急以銀針剔破去其惡血不復生者可救舌心黑口臭二便祕痘色紅紫用青黛防風全蠍石膏酒大黃共為末作餅敷臍上結痂時面紅唇裂宜扶元解毒湯一百十外用紫草生地紅花甘草黃芩黃柏牛子俱生用煎油搽之此方痂後面唇生癢與痘後瘡俱可用面瘡用細茶擂雞膏布裹印之痘後唇口生瘡上唇有瘡蟲食其臟其名曰狐下唇有瘡蟲食其肛其名曰惑皆由裡熱生蟲其人昏昏好睡不思飲食其聲嘎啞此最惡之候必鼻崩齒落失聲而死宜除慝丸百九又口舌生瘡赤者名赤口瘡心脾熱也白者名白口瘡心肺熱也赤用陰陽散百二六白用朱礬散百二七通用洗心散百二八與服又通名鵝口瘡以鵝涎洗淨或鵝糞煎水洗亦可必洗淨乃可敷藥亦有洗之即愈者不愈用緑袍散百二九敷之唇不蓋齒痘後唇不蓋齒此氣血兩虛毒留脾胃也失治將變走馬牙疳急用人參當歸赤芍元枝牛子連翹石膏石斛甘草元參齒癢出血結痂時齒癢或出血此餘毒留於胃將成走馬牙疳也急用連翹牛子慈菰石膏生地銀花紅花甘草煎水噙內服人參石膏牛子慈菰甘草黃芩不過數劑癢與血俱止走馬牙疳牙齦生癢時時出血繼而齦黑腐爛其齒漸落或每日落一齒或一日落數齒滿口齒落盡乃死治法同上或用石膏牛子連翹黃芩生地紫草蛇床枯礬甘草煎水與噙牙齦腐爛宜蟬蛻散百九五或救苦散六三十敷之又方用蠶蟲丹皮甘草心連翹心生地銀花桑白皮沙參茯苓黃柏炒等分煎服虛弱者加人參瀉痢此熱毒下注大腸或值時疫所染五六日上痘與痢俱宜清毒活血用四物湯加芩連木香紅花木通則二症兼治矣此時既解毒至痘起脹用補亦無妨於痢也痘後欲便難便裡急後重或赤或白腹痛是閫痢也皆熱毒鬱於腸胃赤屬血自小腸來白屬氣自大腸來赤者活血為主四物湯加炒芩炒連木通甘草桃仁紅花久不愈者去桃仁加阿膠珠薑炭白者扶元氣為主四君子湯加炒芩炒連木香滑石陳皮裡急後重加枳殼生白芍腹痛多用木香肛門突出加升麻久不愈加黃耆乾薑砂仁赤白並下八珍湯加芩連小便赤澀煩渴加生地木通車前麥冬疹後痢由熱毒甚當用寒涼痘後痢必以固元氣為主胃強能食者可治通用清熱導滯湯七七赤痢或赤白相兼加紅花桃仁地榆白痢陳皮多用芩連俱不用久痢脾虛用補氣養胃和中湯七十八腹痛加酒芍或用人參白朮茯苓官桂川芎當歸赤芍升麻補痘中治痢須用保元湯百七十加升麻為主隨其赤白加減治之在痘中不致陷伏痘後不傷元氣便下膿血參看泄痢大便血二條痘後便下膿血古名倒靨毒從便解不可驟止若後重不順利宜黃連解毒湯百九六或和中湯二百素有積熱腸鳴腹痛裡急後重宜先用調胃承氣湯百六次用芩連湯百七或香連丸百八似痢非痢痘後便下膿血不作裡急後重以清水試其膿血攪動浮有痘痂樣此因腸胃有痘收結滑下無妨用大連翹飲二十九清解之此症腹不痛為異然間有腹痛者痘後腸胃發癰先必作腹痛癰熟內潰膿血注下不過二三日腹痛自止亦用大連翹飲清解之一劑即止勿多服切不可用大黃下行之藥痘毒既潰固元氣要緊痘後浮腫痘後膿血去盡脾土已虧氣血俱衰或感風濕或傷飲食或留餘毒皆能發為浮腫感冒風寒者多自面目先腫身熱口渴宜用升麻柴胡茯苓木通車前防風腹皮甘草薑蔥引微汗腫自退感濕氣發腫者多自足下先腫其色光亮手按之有窩其起緩且其人或好飲小便赤澀以水洗之愈腫治當健脾利水用蒼朮川朴木通車前滑石瞿麥澤泄豬苓茯苓皮腹皮煎服外用蒼朮檀香燒煙燻之以被蒙蓋令出濕水食積兼餘毒者多自腹先腫腹中必隱隱作痛不思飲食且腹有微熱大便黃臭小便赤澀治當消導解毒用蒼朮厚朴陳皮腹皮香附川芎山楂神麯牛子連翹木通車前茯苓法夏甘草脾氣不行發腫者其皮如鼓按之難下治當理氣用人參白朮官桂麥冬大腹皮陳皮薑皮茯苓皮木香澤瀉車前木通名人參五皮散血不行而腫者皮膚之內隱隱若有血路治當活血為主用四物湯加人參陳皮香附木通茯苓面目四肢腫者屬肺因表虛為風寒所侵當發汗用羌活防風桂枝防己蒼朮木通五加皮桑皮大腹皮茯苓皮薑皮豬苓甘草名加味五皮散腹脹如鼓眼胞微腫屬脾因脾土素弱不能制水或傷食滯積脾不能消以致濕熱內蓄作腫俱用蒼朮厚朴陳皮大腹皮茯苓皮豬苓木香水腫者其陰囊亦腫加澤瀉滑石車前木通葶藶子積滯者加山楂神麯三稜莪朮萊蔔丸通治一切浮腫用萊蔔子炒五錢胡椒厚朴五錢白朮一兩共為末糊丸陳皮煎湯下氣弱不行者肉桂磨酒服外用燒酒搽之痘後遍身腫脹毒入於脾不能制水也多不可救痘癰聶痘癰發於未收口前少發於既收以後者多未收以前膿漿薄者或有之既收以後結痂浮薄或速結速落者多有之又有不虛寒而誤服補劑熱劑者亦有之俱宜大連翹飲二十九但當其初發熱發腫時內外夾攻急消散之為上至於成膿則兒難堪在頸項胸腹腰背者尤險外以三豆漿八十三塗之或用赤小豆為細末清水調敷干則易之朱痘發癰則毒出不能內攻此吉兆也然有發癰而死者其中有陰陽之分焉陽癰發一二處或頭上或手足初起腫而紅高聳有頂宜內服大連翹飲外敷三豆漿可消則消之不消則攻破出膿膿盡用生肌散三十六貼萬應膏自愈至於毒火內盛回水之際發熱蒸蒸頸項手腿漫腫不分地界頂不起色不紅痛苦十分此陰毒也難治用生黃耆白朮茯苓當歸川芎赤芍生地連翹牛子皂刺金銀花山甲麵炒玉竹陳皮攻其成形服藥後頂漸高聳腳漸收束成膿者生倘連服數劑不見頂高腳束即加人參以補元氣若猶不效兼之惡食嘔吐二便不調不省人事必死餘毒疽癤參看痘癰凡痘漿清痂薄者必有餘毒收結之餘其毒多發於手足腕中接骨之處紅腫潮熱為疽為癤發於手足四肢者輕發於胸腹囟門耳下者重此毒由骨髓必綿延難愈失治多致穿筋透骨風廢拘攣以貽終身之憂方其始發必然潮熱速用大連翹飲二十九或仙方活命飲二百一疽形既現須用此或用防風荊芥生地赤芍當歸連翹牛子黃連紫草川芎木通甘草白芷弱者加參耆或用防風荊芥牛子首烏甘草痛加乳香沒藥白芷凡腫毒在上用升麻引在下牛膝引在手臂桂枝引張凡痘後雖有餘毒亦須顧其元氣解毒方內必加參耆每見醫家遇痘後潮熱餘毒發作恆據聶公之書輟投大連翹飲以致變生莫測余治此症調元以顧其本解毒以治其標又必內外交攻毒始易去看其腫硬之最起者是潰膿之所也用瓦鋒刺去惡血然後用藥敷四圍留口令出毒氣將四圍之毒趕聚一團再用膏藥貼之拔盡毒血自愈已成膿者亦刺之令膿潰痛止亦以膏藥收功凡餘毒不甚起頂且不紅者多是元氣虧必用內托散然後頂起腫聚始能成膿疽癤敷藥諸方二百二毒瘡已潰不能收口用生肌散三十六或膏藥方二百三痘疔潰爛成坑或疽潰不能收結宜人參敗毒散加山甲蟬蛻殭蠶連翹與服外用伏龍肝陀參各二錢輕粉黃柏杭粉血蠍生赤石脂各一錢血餘五錢黃丹炒八分乳香沒藥各五分冰片一分為末敷之其口自合痘後諸瘡遍身肢節生瘡者名疳蝕此因風寒相搏氣血凝滯於腠理也宜綿絲散三十七敷之自愈見風太早致成瘢癬出膿汁者燒乾牛糞敷之痘抓破出血復灌膿漿成痘風瘡年年至春即發但不傳染他人用防風荊芥牛子甘草苦參當歸或用當歸連翹牛子防風荊芥生地赤芍紫草甘草蒼朮川芎薄荷或苦參丸百九二或花蛇酒百九三外用黃丹黃柏黃芩大黃輕粉共為末豬油調敷或一掃光百九四再於曲池風池三里諸穴灸之則永不發矣又有皮膚之間隱隱起者俗呼疙瘡此餘毒留滯皮膚也宜服解毒藥外用漆蜆剖開取腹內之水洗之或用蜆殼煎水亦可蜆如螃殼生魚泥中凡割漆者必用此殼其性涼而解毒又方用滑石一兩甘草五錢為末調敷痘爛復灌至成瘡疥治法同痘後發癢或用黃豆燒灰調油搽之赤火流丹俗呼天虹腫一片通紅從頭起者過心不治從足起者過腎即死此惡毒暴發乘血橫行也宜內服元參歸尾紫草紅花石膏連翹赤芍骨皮車前木通防風荊芥淡竹葉外用馬蝗蜞三五條置紅腫處吃去惡血以泄其毒或用瓦鋒刺去惡血以三漆磨好墨塗之小便赤澀者用元參紅花紫草生地防風牛子連翹木通車前澤瀉豬苓滑石室女室女十四歲以後發熱之時及報苗長漿之際天癸暴至不必驚恐當問其及期否前後錯日否腰腹痛否惟按發熱之時用升麻葛根湯一或元氣素弱用加味參蘇飲二腹痛加酒炒香附一錢以和其氣不可妄用別法且發熱報痘之時天癸暴至喜其毒火隨積瘀而去將來出痘必稀至於長漿足漿之時天癸適至亦不必驚惶詳看虛實寒熱用藥助其長漿調其回水結痂而已張發熱之初經期適至固喜其毒隨血解然至三日後血猶不止則熱入血室致血妄行否則血虛不能送毒須臾告變矣故經行二日急以四灰散二百十三調酒與服止之若至三日血猶不止急以涼血地黃湯二百十四治之以痘出血止為度女子非經行之期於發熱時經水忽至乃火毒內熾觸血妄行也其毒必盛其血必多急用涼血解毒湯二百十五倍加連翹牛子或用柳花散二百十六女子發痘又值行經經水方止身發壯熱狂言譫語如見鬼神尋衣摸床癲狂百出目上直視煩渴不寧此陰虛似實切不可作實熱治之痘未出者逍遙散二百十七加丹皮痘已出者加味歸脾湯即歸脾湯加柴胡山梔又有邪熱乘虛入血室以致譫狂者古用瀉肝散二百十八不若逍遙散加防風更妥女子正值崩漏適逢出痘氣血俱虛必不能送毒出外急宜大補氣血用十全大補湯或參歸鹿茸湯十五否則必不能出雖出亦易倒陷女子一向經閉血海已涸適逢出痘毒氣鬱於沖衛之間二陽併發其熱必甚其症最危切不可用攻擊之藥使血妄行須養心補血調理脾胃為主用歸脾湯略加攻毒之藥或用逍遙散女子出痘當起脹灌漿之時忽然行經恐血虧裡虛痘易倒陷宜十全大補湯或參歸鹿茸湯女子痘當起發之時其經忽來不能言語乃血虛之甚少陰之脈不能上榮於舌也宜當歸養心湯二百十九待其能言復用十全大補湯女子痘當灌漿之際經水大來血虛不能化毒以致灰白倒陷急用調元內托散二百二十外用胡荽酒噴之使痘起脹或於空處又出一層乃吉服此不效寒戰咬牙喘急腹脹又增他症必難治矣固經方出痘行經一則懼其氣虧一則慮其血衰急取桃樹上寄生擂敷足底湧泉穴三炷香久經水自回孕婦孕婦出痘先以托痘為標次以保胎為本宜升麻葛根湯一加酒炒黃芩六分土炒白朮五分以保胎元至於長漿之際痘暈老紅或紫紅宜清毒活血湯十四加白朮五六分若痘暈淡紅或淡白用千金內托散十六倍加參耆去肉桂外加土炒白朮一錢張孕婦出痘以清熱安胎為主初熱血動者宜四物湯加芩連或用罩胎散二百草一孕婦出痘身熱腹脹手足冷宜八物湯二百草二加木香孕婦腰痛用保胎方七十二孕婦出痘胎將動者急用安胎散二百草三恐胎落則痘陷也朱孕婦出痘從前不能按法調治熱蒸胎墜當令老成穩婆攙扶産婦以熱水淨浴下身仍照半産大産之例扶其上床不要睡倒須強扶少坐一二刻用滾水白酒一鍾入童便半盞和服行其瘀血痘易出易起若痘出稀疏精神清爽二便調飲食好不必妄加治法天氣寒則以棉絮保護天氣熱切不可洗浴妄用紙扇貪受過門涼風至於長漿仍看虛實寒熱加減用藥助其足漿倘毒火內盛略用芩連三五分清之胎落痘稠密者用人參黃耆川芎當歸防風白芷白芍桔梗厚朴木香肉桂紫草牛子産後寒戰咬牙虛甚也宜大補湯加桂附産後小腹急痛瘀血未淨也略與黑神散二百草四行之胎已落者法以補血為先但收靨時胎落者多有可救發熱初出時胎落者猶可救惟當起脹灌漿時而胎落者多致不救安胎方孕婦出痘腹中作痛乃胎動也急宜內服安胎藥外用蓮蓬殼益母草俱燒灰存性艾葉為末各三錢醋調敷臍上連換三次其胎自安下胎方孕婦出痘激動其胎又不得下或胎死腹中最為危險急取推車蟲並其所推泥丸共焙加威靈仙同研末酒調為丸納臍中膏藥貼住三炷香久其胎即下
