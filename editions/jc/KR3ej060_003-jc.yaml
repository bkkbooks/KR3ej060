body:
  text: 卷二初熱三日治法發熱之初身熱和緩或熱或退神清氣爽飲食如常此不必用藥發汗但戒葷禁風調護而已其有憎寒壯熱頭疼咳嗽鼻流清涕者多因外感不可不發散也當視兒體強弱體氣強者用加味升麻葛根湯一汗之體氣弱者用加味參蘇飲二汗之然皆不可出汗太多恐虛其表後難起脹灌漿也既發汗身熱漸緩兒頗安靜其痘必稀亦有痘多者血氣虛也若發汗後身熱不退或煩躁且勿峻攻姑少待之其或煩悶燥渴妄語用敗毒和中散三清之切不可用傷寒家柴胡黃芩乾葛花粉等清解之劑此藥若用差一劑解虛其表至七八日漿必不行雖極力補助莫能救療其痘必枯焦癢塌而死服敗毒和中散覺煩悶少解即止勿服聽其痘外出其中自安或有腹痛腰痛煩悶大熱熏蒸眼紅唇紫舌有黃苔口中臭氣狂言躁語二便不通惡風惡寒嘎齒咬牙者此其毒氣沉重然只宜用敗毒和中散加酒炒大黃微利之聽其痘毒外出則諸症自退然後看其痘或稠密或紅紫帶黑又議解毒可也切不可純用寒涼以阻遏其痘出之勢立致內攻告變初熱險症初熱時唇淡面青手足冷舌無苔精神困倦不思飲食二便清利脈沉細遲緩乃虛症也若猶大熱灼人心中迷悶則元氣虛而毒氣又盛急用調元解毒湯八十四初熱為風寒所閉一時無表散之藥或兒體弱不任發散或既服表散藥不可再表用桃樹皮薑蔥搗爛炒溫敷臍上一炷香久亦取其發散也初熱時小便如血遍身見紫色斑點此毒盛血熱也宜二寶散八十五或犀角地黃湯八十六按小便如血言其赤之甚耳若果是血必不可救初熱四肢僵直不能舉動或氣粗目閉迷悶不醒皆為風寒所束毒不能宣之故也宜蘇解散八加天麻白附全蠍殭蠶若元氣虛者宜扶元祛風湯八十七初熱時遂變失聲此風邪入肺重則用清肺飲八十八輕則用甘桔湯八十九發熱時耳下或頸上有泡皆寒氣風痰所結用紫荊皮防風荊芥生南星生半夏麻黃白芷共為末酒調或醋調敷之或用生薑磨地泥敷之俟痘出自愈切不可用癤毒草藥冰伏其毒初熱逆症初熱頭面一片紅如胭脂者六日後死身如熨斗眼紅唇裂而紫黑者凶腹中疼痛及腰痛如杖連尻骨俱痛者不治如痛不甚而有止者解腎邪可治心窩及遍身皮內有紅塊者不治七孔二便出血不止者必死見紫黑斑者死目閉無魂昏睡不醒者死然有為風寒所閉昏昏好睡者散其寒邪宣其毒氣則愈舌頭紫黑色者死聲啞神昏者死吐臭痰或腹脹痰鳴者死胸高而突者死四肢厥冷舌卷囊縮者死口中常如食物者凶目閉咬牙鼻生黑氣者死飲食不化形色青藍者死唇項腫硬神氣昏暗者死未熱先出賊痘數粒至熱時俱沒有者死見點三日治法見點用藥與初發略同初發之藥在發散而兼解毒見點之藥宜解毒而佐升提凡補滯辛熱如肉桂附子丁香乾薑茯苓茯神鹿茸鹿血白朮半夏淮山棗仁遠志蒼朮藿香砂仁豆蔻訶子五味之類此時猶不敢妄投即用黃耆甘草亦用生而不用炙芍藥用赤而不用白地黃用生而不用熟蓋慮其滯毒氣助毒火以貽禍於其後也見點要合常期發熱四日見標者吉三日見標者次之若二日即見者凶一日見者尤凶雖然不應出而出者固重若應出而不出亦不為輕自古方書皆詳於已出之後而略於未出之前深言出而稠密之危不言留中不出之禍不知已出之毒外寇也未出之毒內寇也速出稠密者外攻也留中不出者內攻也內寇與外寇孰烈內攻與外攻孰重故痘已出而死者必在旬日之外未出而死者必在六日之中凡小兒發熱三四日而未見點者急用捻子照之其痘隱於皮膚之間歷歷可指辨其虛實寒熱而速治之庶毒不內攻也痘出不快痘至五日上頭面胸背俱宜出矣若猶隱於皮膚之內欲出不出謂之不快此症有數等或為風寒所閉或為熱毒所壅或因元氣不足最宜詳辨皮下之點不甚紅紫鼻塞聲重咳嗽惡風膚起雞皮迷悶不醒而出不快者此為風寒所閉也宜加減參蘇飲十一散之或升麻湯用升麻防風川芎蟬蛻牛子連翹枳殼麥冬桔梗陳皮紫草甘草山楂山甲前胡紫蘇弱者加參耆薑蔥引熱服服後被蓋片時取微汗痘即見矣再用推拿以松其肌表痘尤易出皮下之點紅紫或密如蠶種或一片不分顆粒唇紅舌黃臍下痛煩悶咬牙目赤口臭身熱大便閉而出不快者此為熱毒所壅血氣不流行也宜調元化毒湯十去參耆加小川芎清之或加酒蒸大黃微利之或用上升麻湯去紫蘇加黃芩黃連以上二症必從前失於解表身無微汗故欲出而不能若皮下之點淡白唇亦淡白倦臥飲食減少二便清利身涼手足冰冷目閉無魂而出不快者此元氣不足不能送毒出外也宜補中益氣湯若無人參須加官桂鹿茸或溫中益氣湯九托之大抵痘之不出多屬此三症詳審而治之無不出矣又有因邪穢所觸隱伏而出不快其痘必癢宜平和湯二解之外以蒼朮紅棗或沉香檀香乳香等燒煙燻之一說蒼朮乾燥不可用以避其氣仍看痘色暈腳或宣之或補之夏月為暑氣所遏痘出不快煩渴宜人參白虎湯加糯米一撮或五苓散茯苓用赤者加木通乾葛生薑或辰砂益元散加車前木通牛子用香薷煎水調服暑退痘自出凡治傷暑宜利水蓋暑不可汗下當從小便解泄也小兒出痘之時痘毒達於皮膚宜熱氣透泄不可包裹太甚致毒氣壅鬱其痘必多且恐鼓動浮游之火有夾丹夾癮之患初出時吐瀉過甚致脾胃虛弱痘出不快宜理中湯加官桂瀉不止加茯苓豆蔻訶子前有房勞以致腎虧痘出不快多有腰痠腰痛用人參生耆當歸川芎元枝白芍杜仲故紙續斷枸杞肉桂炙草煩渴者加麥冬連翹元氣本虛毒氣又盛大熱痘出不快解毒既恐傷元扶元又恐助熱此際最難措手必用剖雞方托之方見腰痛其痘自出此屢試屢驗痘伏而不出當察其報痘之的確或二三顆或五六顆或上下手足有十餘顆此為出痘無疑否則只有身熱而無報痘之明證乃雜病也雜病則以雜病藥治之出痘則以托痘藥宣之痘出不快煩渴悶亂睡不寧咳嗽失聲用艾葉二兩胡椒三十粒擂爛水調取汁熬膏作餅敷臍中痘出不快用雞冠血和酒服樟樹皮柑子葉生薑共搗爛加麻油炒熱紅紙包熨遍身水楊柳枝葉五錢冬月桔梗煎湯服此方麻亦可用痘已出復隱勢甚危急用紫背荷葉取霜後貼水者白殭蠶取直者炒去絲等分為末胡荽湯或溫酒下見點順症熱至四日耳目口腮元壽之間先見數點者吉或兩顴報點亦吉或面部未見而手足先見者尤吉此標從肝肺脾經來也手足元壽見者屬脾經痘必稀百無一凶兩顴見者屬肝肺二經痘雖多寡不同究皆可治是以俱為順症報點之痘肥大皮粗堅硬摸之礙手者吉此元氣旺毒氣少也痘必稀疏痘作三四次出到五日後手足方出齊頭面胸背頸項俱稀疏者吉蓋面為五臟之府頭乃諸陽所聚二處稀則五臟不留毒氣諸陽悉得上升且頸項疏朗則扼要之區不截胸背不密則周身之血皆榮有此順症縱四肢稠密亦自無妨痘出遍身稀疏者上吉痘初出即有起發之勢日漸起脹頂圓皮粗堅實者吉初出紅活潤澤腳有紅暈不散漫痘與肉色紅白分明者吉見點後潮熱漸減雜症漸退飲食漸進吐瀉皆止至五六日上痘出齊熱退雜症全無飲食如常精神清爽者吉朱見點吉凶單粒報苗者吉雙粒出現者稠密熱退現苗者順夾熱放苗者險顆粒大而尖圓紅潤者吉顆粒大小不一微見尖圓紅潤者半吉顆粒十分之中有一分大二分小不見尖圓紅潤者凶見點險症諸痘未出獨印堂先見一顆者名曉星報點此痘能閉諸毒急以燈火烙之用銅錢一枚印痘上令痘從錢眼出然後烙之庶小兒不躲閃差誤承漿廣額先見數點此心腎二經之苗必凶又恐為瞰報之賊標俱速以燈烙或用銀針剔破吮去惡血旋用拔毒散三十五敷之此標一除能減無限之痘嘴角有痘曰鎖口鼻孔邊痘曰攔門皆為凶痘喉窩之痘主咽痛心窩之痘主煩悶凡耳後窩中頸項窩間有痘皆不吉俱宜速去之熱至四日上痘一見點則毒氣將達皮膚熱宜漸退諸症亦宜漸平若熱不減宜清解丸百三六次服散花丸百三七倘猶大熱煩渴悶亂不寧或點見瑣屑其毒必重痘必多用解毒湯百十二須日進二三服痘或可減若怠忽視之則鋪氈蠶種紫黑乾枯之候至矣蓋四五日內正宜解毒失此不治後雖欲解而不能矣痘出稠密其天庭地角雖然明朗而兩顴一片丹紅不分地界此毒在肝肺不急治必咳嗽失聲癢塌而死用前胡赤芍紫草茸生地丹皮牛子連翹川芎黃芩黃連木通甘草外用水楊柳煎水屢拭其面痘即轉色或以胭脂米擂水搽痘上亦能解毒活血此屢試屢驗痘疔賊痘痘中有紫黑乾硬暴脹獨大腳無紅暈者痘疔也痘疔能閉諸毒帶累眾痘未齊有疔則諸痘不能出現既齊有疔則諸痘不能起脹行漿時有疔則諸痘必致倒陷故初出之時見有紫黑獨大之點恐其成疔即以銀針刺破吸盡黑血以拔毒散三十五敷之或四聖膏三十四亦妙朱痘疔初見時以燈火焠之再用拔毒散搽之不消然後用銀針剔破疔頂必出紫血用棉花擦淨隨用四聖膏填入自然爛去疔腳膿水淋漓一法用獨蒜片安疔上以艾於蒜上炙三壯自消一法用巴豆一粒去皮硃砂一分研爛刺破點入一時即消張痘疔初刺破用拔毒散敷後次日若再硬脹仍刺破以前藥敷之必轉紅活方可已也若針挑不動手捻有核須用刀從四邊刮開以小鉗鉗出其形如釘長半寸許仍以前藥敷滿瘡口自愈附方山慈菇和蜣螂肉搗爛塗上能取疔根又四肢有痘慘暗堅硬痛甚或外無痘而內有核作痛亦痘疔也宜艾火灸之或燈火焠之若不急治其疔即深陷穿筋透髓腐爛見骨甚可畏也天庭有黑點心窩舌上必有疔地角有黑點陰囊必有疔兩顴有黑點兩腋必有疔準頭有黑點四肢必有疔此觀顯可知其隱也朱賊痘先含微水頂有黑色外形獨大與痘疔無異但痘疔根腳微腫賊痘根腳不腫治法以燈芯蘸清油焠之其毒即化倘賊痘甚多燈火難受用拔毒散搽之日三四次若焠之不退搽之不起不能成漿則不可救痘疔賊痘俱用人參黃耆當歸白芍川芎牛子連翹人中黃山甲防風煎服加雄黃更妙看痘形色痘色慘暗不明此邪火壅於肌肉而血不榮活也宜加味升麻湯百四十天庭暗加麥冬黃連兩顴暗加丹皮黃芩發熱一二日即見標者曰火裹苗不急退其熱則苗槁矣用清地退火湯百四一或用秦艽酒洗淨水煎服痘出大熱不退痘色乾枯或紫或黑界地不分皆毒壅血所致不急治至八九日必腹脹氣喘癢塌而死宜涼血解毒湯百四二或大成散百四三用紫草紅花赤芍人中黃煎水調服譫狂者用麥冬燈心車前木通煎水調服大凡毒盛之症不可用當歸鹿茸誤用則串成一片矣痘一齊湧出大熱煩悶稠密焦紫皆熱毒猛烈氣血凝滯不急治必變紫黑二陷死於十二日內宜調元化毒湯十有嗽加陳皮花粉痘出稠密乾紫身熱氣粗譫亂驚搐時點額搖頭手足牽引此熱毒滯於臟腑故肝木動而生風心火炎而驚譫宜祛風退熱用烏金丸百四四痘雖見點其毒郁中壯熱煩渴紫色不起唇口硬裂此毒留脾胃宜內解脾胃之郁外清肌肉之邪用防風白芷紫草甘草紅花生地蟬蛻木通川芎赤芍煎水調下小無比散百四五痘初出如雲霞突起紅丹遍布此浮游之火散漫於皮膚宜涼血解肌以退火用元參升麻湯三十一痘有內黑外白者毒凝於裡也用三黃湯百四六痘有內白外黑者毒滯於表也宜解肌活血用升麻湯百四七痘出頂上有茱萸紋毒凝氣滯也色不甚紅者用調元化毒湯十色紅甚者用涼血化毒湯百四八加川芎蟬蛻防風若不急治後必成空倉痘死於一十三日內以上俱毒盛血熱之症固宜清解然不可過用若痘轉紅活人稍安靜即宜漸進溫補以為成漿之地見點虛寒諸症痘出而熱不退痘頂不起根窠欠紅若隱若現出而覆沒兼之唇淡而青雙眸不炯聲氣不雄此氣血兩虧不能盡發其毒也不急治毒將內攻必變灰白癢塌死於八九日內宜千金內托散十六痘出雖稀其痘與肉色無異根窠絕無紅暈此血虛而氣亦不甚振也用人參黃耆當歸鹿茸川芎白芍又方用保元湯百四九有初出時痘雖不紅而粗肥起頂者此氣至而血未至也不可一概作血虛論至起脹時其腳自紅痘出身涼不思飲食痘色灰白吐乳泄青手足厥冷腹或脹痛此純陰之症最為危險速用回生丹五十一熱服被蓋片時令陰退陽回痘自紅活吐瀉不止用異功散五十痘初出貴瘡厚堅實若皮薄體軟此毒在氣分或氣虛不振也不急治必變灰白塌陷或一包清水潰爛而死速用回陽散火湯百五十發熱和緩清爽飲食如常出痘少點數明至三四日而倦怠嗜臥不思飲食所出之痘形影淡白點粒不明此非痘毒輕少乃血氣虛弱送毒不出也宜溫中益氣湯九托之甚者必連服二三劑痘出始齊其痘必多若因其安靜不急托痘出外延至五六日毒氣內攻須臾告變矣昔人謂熱輕則痘輕可盡信乎以上諸症俱是虛寒然痘色白者亦不可概論有熱毒鬱結於中使氣血不能舒暢痘色㿠白者必解毒活血其痘乃紅不然三日後必變紫色焦枯矣但此實熱似虛者痘色雖白其人必唇紅舌苔煩悶不寧宜調元化毒湯十若虛症既形痘色又白則必以補為主夾斑夾丹夾疹聶痘有夾斑而出者初見痘苗一二顆其空處及遍身所出俱紅赤點張云斑稍大而不紅無顆粒不見高聳隨出隨沒又有夾丹而出者初見痘苗一二顆遍身紅赤成片如雲頭突起張云丹點甚紅而小粒若丹砂此皆毒氣浮游散漫於皮膚間也不必驚惶但用元參升麻湯三一一二劑斑丹自退用荊防解毒湯四八亦好二症俱以元參為君遍身發斑紅紫無痘出現不醒人事急與雪梨食之或雪梨汁磨象牙與服又用芙蓉花川椒胡椒共為末紙捲成條蘸麻油燈盞盛之燃照被內覆蓋一時久其斑自退痘自現痘有夾疹而出者初見痘苗遍身紅色碎碎紛紛形如出疹宜元參升麻湯加桔梗酒芩令其疹先退痘自起發出痘亦稀或用荊防解毒湯按痘出時有先見疹子而夾出如水痘者此是正痘因疹子耗去榮血故自似水痘但發散其疹子則正痘自成蓋疹子從不夾水痘故也補痘有夾痧而出者其形如粟尖圓而硬中含清水蔡氏謂痧與疹皆麻之異名但痧有水而疹無水宜四苓散百一加防風黃芩又有夾癭而出者痘未出數日之前或頸項或耳後或腋下發一小塊大者如桃小者如李此虛火挾痰最宜速治用貝母花粉甘草之類清利解散庶免後患夾水痘痘有夾水痘而出者或正痘未出而水痘先出不必過慮但治正痘水痘自起結痂而愈小痘痘之大者名大痘小者名小痘雖不甚起脹而尖圓可愛此乃毒輕之症故易齊易靨不如常期亦無害也驗出齊否看痘出齊與否以腳心為驗腳心有痘則出齊矣若痘稀者不必拘此以身不熱為出齊食肉聶食肉不可太早必待痘出齊身不熱方可食豬肉若熱未退而食肉以助火邪必成大患雞肉首尾俱不可食惟起脹時怯弱者食之以助行漿壯盛者亦忌之諸魚皆腥牛羊皆膻痘家最忌並宜禁絕朱痘出齊身不甚熱宜食鮮鯽魚以助胃氣至灌漿時宜食肥母雞或線雞亦可大漿未滿鵝肉亦可綿羊肉亦可俱不用鹽若兒小不能食當令乳母按期而食又有一種素痘長漿之時食葷即吐當以香蕈燉豆腐豆腐皮及春筍和香油或生薑少許與食切忌醬醋見點逆症凡痘初熱一日即出者凶二日出者次之一齊湧出者不治此由惡毒猛烈不循經絡斬關破壁而出也急宜解毒涼血熱退毒清或猶可救否則焦黑而死天庭方廣印堂承漿先見點者此痘出心腎固由毒參陽位火臨水府再加天庭地角稠密慘暗則心腎交敗水火受傷必唇紅目赤色白痰鳴而死痘已出後熱一遍復出一遍者凶痘密如蠶種者凶初出全不起頂如燈燒湯泡此氣血不和毒無由化也九日後癢塌而死初出不似痘形遍身之痘如蚊咬或滿面血點如噴丹砂此毒壅於肌肉不能透出成瘡也十日內必死初出連肉通紅不分顆粒形若紅氈者不治或以化毒湯加紅花芩連紫草辰砂蘇木治之界地能分十可救一初出未見痘形只有紅斑如錦如霞者急用元參升麻湯三一或犀角地黃湯百五二退之若不能退六七日間必死痘稠密其根窠絕無紅暈或紅而散漫此氣不能領血血不能載毒也急用八珍湯若紅活起頂或猶可救否則必死痘初出即白與肉色無異久不轉紅潤者死初出即含水珠皮薄易破者死痘初出皮薄色光明若琉璃根窠全無血色一二日間即大如點必成一包清水八九時擦破而死大補氣血或可救天庭方廣先見賊標光亮好看條然而沒者死痘初出煩躁不寧腰腹痛口鼻氣粗點見紫黑者死初熱腰痛痘出痛愈甚兼之標如蠶種煩悶不寧五六日間必口唇青黑舌上生疔而死痘既出狂言如見鬼神好飲冷水點從腰上先出者死痘出或青或黑如痣或肌肉青黑成片者死痘出稠密口唇崩裂胃爛發斑者不治此毒攻脾胃大宜解利若下膿血十可救一痘出舌卷囊縮者死痘初出即紫黑焦枯者死初出即頂陷中有黑點如針眼者毒入臟腑也不治痘初出即有紫黑之點如綠豆大見於兩腋及腹上此肝肺脾皆中毒也不過三日遍身之痘俱紫黑而死痘既出後發無名腫毒十有九死此毒氣不能泄之於瘡故發此腫較之餘毒發疽為更烈也渾身發紫泡刺出黑血者死痘出斜視若有正視則無面如橘皮者死痘出形如蠶殼又如蛇皮者死以芎歸勻氣湯百五三治之若轉紅活十可救一先出數粒于山根其色深紅而紫者凶此氣弱不能主血血與熱毒乘虛犯上也急用涼血化毒湯百四五痘初出口中腥臭之氣勃勃沖人此肺中毒火熬煎肺將爛也急用清金湯百五五緩則必變失聲喘急而死痘初出時即含水泡或將起脹即帶膿漿或膿水未成忽然收靨此皆毒入太甚失其自然之序也不應至而至謂之太過應至而不至謂之不及太過者毒之烈其法在清毒不及者氣不充其法在扶元補初出三五成群俗謂梅花痘其後必連串一片不能成漿凡見此症惟四肢有者無妨若遍身頭面多有必不可治起脹順症痘出齊後熱退身涼飲食得進精神清爽上無咳嗽吐逆之弊下無泄瀉秘結之虞痘出稀疏顆粒分明頂尖圓放光日漸起脹腳聚紅暈帶漿而升先出者先起脹出齊至足面部水汁俱行天庭地角左右頰腮俱有潤澤水至八分其腳便有漿膿或水至即帶行漿更為氣強血盛易漿易靨最吉其次漸漸升灌亦吉不必用藥只要飲食調和起居謹慎自獲平安切莫冒犯穢氣致外邪沖觸內毒勿與肥滑恐生泄瀉莫食生冷恐致腹痛起脹險症痘之起脹雖在六日之後其調治之法當施於七日以前蓋痘之所以難起者毒盛痘稠也凡解毒之藥多是清涼惟七日以前可用若八九日上候當用補毒若未清則畏首畏尾難施治矣故六七日間毒之甚者急宜解之痘色紅紫焦枯者毒盛血燥不能化也宜清毒活血湯十四痘色淡白泡不尖圓根無紅潤不起脹者氣弱血寒不能送毒於外也宜參歸鹿茸湯十五或千金內托散十六手足冷加木香丁香肉桂寒戰咬牙加肉桂附子泄瀉加白芍豆蔻訶子木香丁香肉桂凡痘不起總由毒重而氣血虛看痘須看面部蓋面為五臟精華所著面上之痘好則臟氣充實毒不內留雖遍身稠密不起亦可以治若面部不起而手足之痘先脹此陽氣不能上升而流串四肢最為凶兆急用千金內托散多用川芎加升麻以提氣上升面部又以天庭為緊要天庭不起雖兩顴及地角俱起亦無生機蓋天庭乃至高之所諸陽之首此處不起元陽衰敗安能運化急用昇天散百五八痘遍身俱起而手足不起乃脾氣弱不能灌溉四肢也宜補脾快斑湯百六四痘方起脹即帶黃漿此毒火熾甚俗號搶漿痘不拘何處急剔去其膿以拔毒散百三敷之不然能滯漿路令諸痘不能成漿又或間有紫泡黑泡血泡俱毒盛血滯為惡類之標若不連退能引諸痘皆成此泡亦宜刺去惡血以拔毒散敷之按血泡有血熱氣虛之辨詳見異痘痘已半起忽然平塌此元氣虛或為風寒所觸或為穢氣所沖或誤服寒涼所致必詳審其由為風寒所觸者其症必惡風皮毛粟起用生薑附子桂枝令出微汗痘自復起為穢氣所沖者其痘必癢宜平和湯十二外以沉檀棗核燒煙燻之穢氣衝觸譫妄癢塌抓破出血聲啞氣急用石膏寒水石麝香盆金甘草共煮去甘草渣再煮乾為末蜜調敷胸前誤服塞涼者痘色必白用內托散十六加丁香附子補中氣痘初出紅活至起脹時忽然變紫黑此必從前失於解毒致毒留滯於中將作內攻最為危險速用人牙散百五九痘雖鮮紅究乾燥而不肥潤此毒火盛血不足也宜滋陰退火用四物快斑湯百六十痘雖光肥而帶濕脾中有風濕也不治則成潰爛宜四君子快斑湯百六一痘雖紅活充滿而皮薄嬌紅擦之即破此氣不足也宜保命丹百六二加無價散五三內傷飲食腹中飽脹而痛痘不起脹此中氣為食積所滯不能宣暢宜寬中快斑湯百六三誤食生冷致脾虛不能起脹宜理中快斑湯百六六泄瀉加肉蔻訶子遇天時暄熱又加包裹以致火毒郁遏而不起者宜白虎快斑湯百六五小便赤澀昏迷宜定心散九十痘有四圍高起而中心陷者其症有輕有重痘稀者輕痘密者重此皆中氣不足宜內托散十六若中心陷而黑者此毒留於裡中氣鬱而不升也宜理中氣兼化毒不急治必成鐵殼空倉而死須用人參黃耆當歸白芍川芎牛子連翹人中黃山甲防風加無價散五三及雄黃若黑硬幹枯而中陷者是痘疔也前方與服余見痘疔又有中心微起而含水意其四畔卻乾枯此毒火熏蒸津液將枯之兆必身熱煩躁不急治盡焦枯而死仍用前方加前胡麥冬凡痘出昏迷不省人事用辰砂一錢冰片一分人參三分加豬尾血溫酒調勻與服神效張治一兒痘出齊而熱不退昏沉不省人事諸藥不效用大成散百四三一服發出臭汗遂熱退人蘇痘亦明朗又一兒痘出稠密慘暗悶亂不寧紫將變黑清毒活血諸方不效至八日症甚危急用紫草茸人中黃各六分人參三分連進五服痘盡起脹因名其方曰紫黃飲凡痘焦紫不起用水楊柳煎水布蘸頻頻拭之秋冬葉落用根補痘起脹時有一處焦枯不起如柿餅大其根下皮肉以銀針按而搖之亦不甚活動此毒氣留滯也宜胭脂塗法二百廿七起脹時痘漸漸變黑延蔓一身此天行疫癘之氣宜加味保元湯二百廿八連用十劑五陷聶痘出齊後當治不治則漿不行而五陷之症作矣五陷者白陷灰陷紫陷黑陷血陷也紫黑宜清灰白宜補血陷宜轉補氣痘稠密紅紫身熱氣粗根腳紫暈而頂陷者紫陷也失於清補則轉為黑陷不治此毒熱熾盛蔽其氣凝其血也宜清毒活血湯十四倍參耆苓連紫草一二劑紫色退而痘立起黑陷亦用此方然多不可救朱云有誤用溫補變成黑陷者治同痘雖稠密其色淡白根無紅暈而頂陷者白陷也失於溫補則轉為灰陷此血氣虛寒宜參歸鹿茸湯十五或千金內托散十六隨症加減痘粒通紅成血泡而不成漿者此氣虛不能統血也宜參耆湯十七大補其氣疱即轉白成漿失此不治則氣愈虛而為血陷治亦不外此方血陷與紫陷相類但血陷雖紅然淡而不紫根腳亦淡紅紫陷屬實氣粗身熱血陷屬虛氣弱身涼張紫陷之症必毒盛血熱初見時其色深紅而無潤澤其人煩躁口渴二便不利大熱不退此時失於清利則毒熾血燥遂變紫色而陷伏須清毒涼血用絲瓜化毒湯百六八服此不起用小靈丹百六九再不效必死或用無價散五十三加冰片以紫草煎水調服弱者加人參或用紫黃飲百六七或用桃花二錢梅花一兩絲瓜五錢硃砂二錢人中黃二錢為末紫草人參煎水調眼又用水楊柳煎水外浴起脹逆症頭面不起雖遍身皆起亦死諸陽不升也痘不腫起而肉先浮腫者不治毒蘊於肌肉而不達於瘡也一片紅氈須詳察之痘形磊落而未起者此是血熱宜涼血化毒痘自起矣若瘡跡模糊摸不礙手則毒氣散漫不能成瘡安有生理又有腳地不紅而不起者亦要看皮下之痘若顆粒分明摸之礙手磊磊於中此是氣血兩虛用千金散托之自起若色黑暗形跡模糊摸不礙手則毒滯於內不得成瘡定不可治痘未起脹而頭目先腫者名大頭瘟宜散陽分之邪急用救苦散百七一服此不應者死聶云此乃氣血虛弱不能拘攝其毒而發腫皮色未至光豔如瓜瓠之狀者急宜大補氣血痘密而目不閉者凶毒未盡發不甚腫脹故不閉也急用千金內托散十六托之不起者死又有先目閉至九日十日忽然腫退目開此毒氣內攻也急用內托散托出毒氣目復閉者可治不閉難治凡痘稠目閉必十二日毒退目開乃正期也早開者凶紫黑不起乾燥不潤慘暗不明者死黑而陷者死在八九日內遍身黑陷悶亂不寧神昏氣惰者死痘間有紫黑泡刺出黑血繼而處處有此泡者毒熾血死也不治灰白不起漸成塌陷膨脹不食氣促神昏者即死灰白頂陷內外俱有紋路而根窠血散不聚此氣不充血不附也更加泄瀉不食則脾胃中虛死無疑矣灰白頂陷腰腹大痛腎氣敗毒內攻也不治痘當起脹時啼哭不已日夜呻吟煩渴悶亂譫妄如見鬼神者凶此毒鬱而不能達也張曾治此症用豬尾血冰片五釐穿山甲三分硃砂三分共為末人參三分煎湯共尾血調服痘乃起脹後補其中仍加牛子慈菇兼與解毒而愈痘起脹時吐利不止乳食不化二便下血此脾胃敗也起脹時痘如煙霧罩定者死手足之痘見而復隱起而復塌或上身帶水下身枯者凶然八九日間氣未下行不可定論為凶必面上灌膿下乃有水也惟終於枯者乃凶耳起脹時漿水未行口唇即有黃漿俗名鵝口最是惡候急宜解脾胃之毒用調元化毒湯十加石膏為君又用石膏牛子甘草煎水時時搽口唇並與噙之或可救也不然必唇崩齒落而死按此症用瀉黃散亦可方見二百二十六起脹時痘頂即含白漿者名為痰利主十一日死起脹時面如錫蕩者死痘焦紫如漆點者死形如疥癩者死紅腫如爪者死痘頂上有黑眼如豬鬃者毒入臟腑也急用內托散十六托而不起則難救矣灌漿三日治法痘至七日宜灌入日宜滿九日十日乃漿期也初出是血其後血化為水水化為膿至於成膿其毒乃化治痘之法須預為調理莫待變症始倉惶失措故發熱之初當為出痘之計見點之時當為起脹之計出齊起水即要立行漿之計蓋漿之不行由於毒之內滯解毒之劑可施於七日以前至九日後斷不敢用清涼明知毒入內攻亦難於救藥也灌漿順症九日十日為灌漿之期其痘圓滿光澤有膿窠者其毒漸化而漿行也色如綠水漸變瘡蠍按之其皮堅硬身體溫和二便如常飲食能進並雜症者順也不必服藥但節飲食謹風寒避穢氣慎起居而已痘至九日面上即帶漿腳其漿漸升其暈漸小其初如葡萄色其後如黃蠟色則漿熟矣頂射黃漿乃漿滿氣充此順症也痘至起脹腹中作飽不思飲食是毒猶滯於內若知飢餓慕飲食是毒不內留臟腑清快吉兆也灌漿險症痘起脹雖光潤然手摸之軟而皮皺此陽氣不充漿不實後必不能收靨又灰白欲成塌陷或頂平腳潤將成塌陷者俱用人參黃耆白朮鹿茸各一錢川芎五分當歸八分肉桂八分淫羊藿一錢山甲木香各三分加黃豆引痘水起脹而漿不灌者宜七真湯百七二痘皮薄漿清宜補氣健脾為主用實漿散百三七頂陷無膿或服內托之藥反不起者必氣足而血凝也宜當歸活血湯百七四遍身俱起脹灌漿忽然變色者不可不察變白屬虛宜千金內托散十六變紅變紫屬熱宜當歸活血湯加人中黃人參起脹俱好至八九日大便忽閉欲便而不能便裡急後重宜破氣滑利用歸尾枳殼各三錢紫草生地各一錢與服即通此餘熱下注大腸若不急治忽發熱而死即不然後必成痢痘破成坑者亦內陷也急服內托散托出毒氣外敷白龍散即干牛糞燒為末也痘灌膿時外雖起脹其痘軟其色乾枯內無漿汁此名空倉痘最為危候宜詳看其虛實寒熱用藥攻漿如實熱又兼毒火內盛者急以清毒活血湯十四攻之若虛寒者急以千金內托散十六或參歸鹿茸湯攻之凡見此症當以手次第按其痘頂其中空與不空一目瞭然倘疑而未決再以銀針挑一二顆空則俱空可知治空倉痘補血為君補氣為臣氣血流暢毒化為膿膿之不成其病有二毒氣熾盛則血燥而凝故不能運化以成膿元氣虛弱則血寒而縮亦不能運化以成膿痘當長漿之際平塌無膿復發身熱於平塌之空處復出細小痘粒比先出之平塌者覺多名曰子母痘先出者為母後出者為子子來救母吉兆也子之行漿不須三日充滿隨出隨灌隨灌隨足子漿充滿毒已化其大半母亦漸次成膿矣痘雖起脹而不成膿其內一包清水乃水泡也此是脾虛肝盛土不能制水宜平肝健脾為主用人參黃耆白朮淮山白芍茯苓米仁丁香半夏白芷鹿茸當歸肉桂外以銀針刺去其水雖百餘顆亦盡刺之用除泡散百七五敷之其刺破者仍復灌漿要時時詳看有清水者又刺去之若不刺去則遍峰之痘盡成水泡不可救矣聶水泡宜用參歸鹿茸湯十五頭面身軀有漿惟膝下水泡無妨遍身如魚泡者形若水晶者皆不治補灌漿時有發白泡如彈子大者宜保元湯百七十痘變紫黑泡乃毒盛血熱血不能化毒也急刺去其水以拔疔散三五敷之有刺去而旋生者又刺之要頻頻詳看不然俱變此泡矣紫者或可救黑者必死內服扶元活血湯百七六膿漿滿時或為寒氣所薄一時痘俱紫黑如葡萄色不必驚恐急以好肉桂磨服或煎服立見如舊倒陷凶痘既圓潤起脹而復陷者名倒陷倒陷之症表裡皆虛有因泄瀉而倒陷者用人參黃耆白朮茯苓訶子豆蔻肉桂附子木香丁香有因清解太過而倒陷者氣血兩虛也用人參黃耆當歸鹿茸川芎白芍肉桂淫羊藿炙草有因風寒所觸而倒陷者以散寒扶氣為主用人參羌活川芎桔梗升麻生耆炙草生薑引有因穢氣衝犯而倒陷者宜補氣解穢為主用人參炙耆當歸川芎白芷肉桂乳香丁香藿香木香仍用棗核檀香燒煙燻之治倒靨之法亦如是倒靨凶痘至六七日間腳漸開頂愈陷其色純白形如豆殼者名倒靨又有其痘和皮脫去者亦倒靨也又有先起頂有清水一旦水收痘靨全無痘瘡者亦倒靨也世人誤認為收靨不知好痘收靨必有瘡痂且緩緩而收若速收無痂皆倒靨也痘至倒靨則毒入內實難療矣必不得已而治之用人參黃耆當歸川芎肉桂山楂紅花白朮薑棗引此條原本在收結險症門今移置此附方倒靨黑色用狗蠅七個冬月耳中鑷取夏月身上取焙為末酒調服或生擂碎酒調服一時痘即紅活催漿攻將起陷之法莫詳於五陷之條但有方書未載而食物亦可攻漿者茲備言之雞冠血久年老雞及雞爪人乳羊肉野豬皮及蹄爪黃豆作藥引糯米作藥引朱聶氏清毒活血湯千金內托散二方內並無皂刺山甲予治壞症漿不得成用此以攻爛之令其膿水淋漓亦可起死回生此不得已而灌用之也凡用二味皂刺宜用尖山甲宜用前足甲片附方五穀蟲為末加雄黃硃砂酒調服千歲蟲焙乾為末酒調服黃豆漿雞冠血和服雞不可殺白鴿煮食牛蝨焙為末酒服灌漿逆症痘紫黑慘暗乾枯塌陷者死諸痘有漿獨天庭不起乾枯而塌者死天庭之痘如沸水澆皮延及兩頰漸干而枯似靨非靨者死頭面腫甚痘皆抓破臭不可聞者死面腫早退痘陷無膿目無神光者死漿不充實不肯結痂泄瀉寒戰者危用桂附理中湯或可救頭上稠密身上稀疏痘色淡白不起灌者氣血兩虛也宜千金內托散十六加升麻四肢不起者加白朮桂枝滿身無皮流水不止此爛痘也宜內服實漿散百七三外用除泡散百七五敗草散二百二五敷之或多取茶葉水煎過鋪床上用草紙隔一層令兒睡其上一夜膿水盡干痘灰白皮薄擦即破者死二便閉結腹脹聲啞肌肉焦黑目閉無魂者死痘爛無膿吐瀉不止二便下血乳食不化者死灌濃之際面部諸處即有乾枯黑靨者死抓破之痘復與內托亦不補漿目開腫退此毒入內攻也不治痘頂有孔漏出膿水堆結乾枯灰白如天泡瘡及賴頭之形此名漏瘡不治用人參炙耆當歸官桂川芎白朮白芷炙草丁香淮山龍眼蓮肉煎服或可救起灌時舌上有黑點此疔生舌上也不治漿不滿而燥癢擦破血出隨即焦乾如鍋焦樣不治長漿不濃渾身是淡白水漿形如燈籠及回水之際燥癢異常擦破即干如蛇蛻者不治補膿漿未滿而痘平塌根腳若有黃漿名曰萎黃不治灌漿時各處飽滿惟手足不飽滿或灰白色或清淡水或虛餒平塌此脾胃弱也用黃耆桂枝防風炙草白芍生薑棗肉名快斑越婢湯收結三日治法痘至十一二日其漿宜飽宜濃至十二三日漿行至足面上漸宜收靨腳漸不紅此時用藥宜以健脾利水為主蓋脾胃強則肌燥而膿易結小便利則濕去而汁易干又當扶陽固本陽氣盛則毒在外收而痂厚貞元固則毒不倒靨以為殃準頭先靨脾胃氣充兩頰先收肺肝氣足日後總無變症諸部未靨而地角先焦此腎水早枯滿面方漿而天庭先靨此元陽已憊須防日後有變結痂順症痘至十三四日其膿漸干其色蒼蠟或如葡萄從口鼻兩旁人中準頭左右二顴收靨起乃至地角頸項胸腹腰背逐漸收下然後上及額顱下至於足痂厚而圓或黃或赤雜症全無者吉痘自人中元壽先收者吉蓋人中為陰陽交會之所從此先收必陰陽和暢元壽乃脾胃中土之區從此先收則脾胃氣旺髮際以上陽中之陽謂之孤陽足膝以下陰中之陰謂之孤陰孤陰則氣難充孤陽則血難用痘至二處所以收靨必緩必收至足下而後頭顱乃靨不必施治收結險症痘當收靨之時身體宜溫乃能回水干漿若身涼足冷當收不收此陽虛也宜溫表調中湯二十六又有發熱熏蒸當靨不靨者毒未解也須退其熱宜清表解毒湯二十七或甘露迴天飲八十二痘當收時忽增大熱毒未化也須防後陷宜調元解毒湯一百十裡熱太甚一向不能大便而不能靨者當微利之用當歸解毒湯百八七當收不收身發大熱譫語喘急二便秘結煩悶作渴此熱毒入心肺也宜清金導赤飲百八三膿漿足而當靨不靨宜回漿散百七八或象牙散百七九又有其漿雖充而濕潤難收者亦用回漿散加苡仁豬苓澤泄半夏痘靨至頸或至腰而下身不靨此熱毒盛也宜五苓散加牛子滑石木通若大便閉結用當歸解毒湯百八一服藥無效者死遍身俱收惟頭足不收者宜茯苓白朮當歸川芎升麻牛膝牛子白芍面上俱未收而耳上之痘先收此毒侵腎經也不急治則諸痘難收恐成倒靨耳冷者用枸杞故紙知母當歸川芎白芍山楂陳皮白朮甘草耳熱者用黃芩黃連川芎白芍厚朴木通甘草當靨之時忽然灰白頂陷吐瀉腹脹寒戰咬牙此脾肺兩虛毒將內攻宜內助散百八二痘頂漿未滿足而血腫忽退目閉忽開瘡腳散闊皮破乾燥似靨非靨此氣血兩虛津液枯竭毒氣不能外散而反內攻最為危候急用黃耆人參白朮茯苓官桂牛子麥冬連翹白芷白芍有因嚴寒所遏不能靨者宜桂枝解毒湯百八五此方無參則不敢用有因暑氣熏蒸不能靨者宜甘露解毒湯百八六痘結時宜有腥臭之氣取其氣外泄若痘多而無臭氣其毒猶未盡泄也然其氣如腐肉令人不可近則毒化未清又急宜清毒活血不然恐變出非常痘靨後忽瀉膿血痂皮者古謂之倒靨毒既下泄不留內攻俟其下儘自愈不必妄治若泄而水穀不分宜陳氏木香散百八四合豆蔻丸多服熱藥以致熱毒猖狂痘爛不能收者宜回漿散加前胡牛子連翹麥冬車前木通外用輕粉黃連為末調油搽之或以芒硝為末調豬膽汁敷之又有表過痘爛水流不止者用人參黃耆白朮白芷防風茯苓又用除濕散百八十外用敗草散敷之痘破成坑不能合口用生肌散百八八或綿繭散三十七摻之膿後不能結痂反成腐爛連皮脫去此由中氣不足急用保元湯百七十加當歸白朮茯苓牛子連翹官桂木香治之必其破處復加腫灌黃汁堆結成痂謂之補漿原無痘處復出一層謂之補空如此方可望其生否則必死痘損破灌膿作痛膿水不幹名疳蝕瘡犯著即流血不止不急治必潰傷筋骨而死宜大補湯百八九外用綿繭散三十七靨時有外潰膿水淋漓者謂之水靨宜用新瓦為末篩令極細絹袋包撲患處俟干痂堆積不落內又熏膿即以瓦灰鴨蛋調敷立收而愈或用房上多年敗草為末扌艷之或蕎麥粉或松花粉更好或多年黃牛屎燒灰亦可頭而損破反復腫灌膿血浸淫須防壞眼崩鼻敗面缺唇用升麻解毒湯百九十痘瘡原多潰爛收結後手足等處仍作熱臭爛膿水不止宜生肌散其有仍作熱作膿者毒未淨也宜大連翹飲二十九又有餘毒流注各處出清水者宜綿繭散痘出稠密用藥極力攻漿漿足而潰爛流膿作臭氣此為吉蓋膿成而毒解矣宜松花粉敷之不必妄加調治若身熱不結痂宜清表解毒湯二十七倘身不熱口不渴唇淡食少手足冷不能依時結痂須大補氣血用溫表調中湯二六朱痘出稠密時值炎熱潰爛臭穢蠅蚋逐臭生蛆甚至有拖尾之蛆藏於爛痘之內見之生怕然亦不必驚惶毒火內盛者宜清表解毒湯元氣內陷者宜溫表調中湯催其回水結痂外用蛆藥取嫩柳葉鋪席上令兒睡蛆盡出而愈或用豬肉片引出以藜蘆貫仲白蘞為末真香油調敷此二方前方出張氏後方出綱目朱氏有藥無名特為補出又方用經霜桑葉及野薄荷煎湯洗之蛆自去痘已成膿而痘頂之上有小孔痘漿從此漏出名曰漏漿此元氣虛弱肺氣不固也急用松花粉扌艷之堵其小孔使結厚痂再看虛實寒熱用藥助其回水結痂收結時身熱唇紫兩頰通紅此毒乘於肺將發肺癰也宜清金解毒湯百九一痂不落痂黑唇紅舌有苔身有熱痂不落者餘毒為殃也宜調元化毒湯外用細茶豬膏共擂絹包印痂上茶以解其熱膏以潤其燥若痂薄唇白舌無苔此元氣虛血不潤故不落也宜人參黃耆當歸炙草蟬蛻與服外用雞膏與茶潤之自落痘痂不落虛弱之甚昏沉不省人事宜人參清補湯百七七痂干陷入肌肉不落用乳香二錢輕粉二錢共為末豬膏調敷或用鷹糞燒灰馬齒莧汁和蜜調敷或百花膏二百廿九潤之亦好過服辛熱痂不落者用升麻葛根防風連翹蟬蛻解其肌熱其痂自落補痂不落胸背手足無妨惟面上不落可慮毒聚於陽會也宜大連翹飲二十九加白芷外以百花膏潤之痂至半月或一月黏肉不脫或發癢此因發表太過無力收斂也宜人參固肌湯用人參黃耆炙草當歸蟬蛻糯米引痂雖幹好但半邊掀起半邊黏著不脫宜升麻葛根湯升葛芍草加防風荊芥蟬蛻連翹附方黑豆半盞煎濃汁加豬脂熬膏搽之雞子黃熬油搽之結痂逆症遍身未見黃漿而口唇上下先黃熱而忽焦者凶見此速宜剔破未靨將靨時口唇腐爛白至舌者死毒攻胃也口中常如食物者不治頭顱地角及手足心先收此邪火入心腎也必凶面部胸腹俱未收而腳先收者不治遍身臭爛如餅樣者死急用內助散八百二或可救遍身發癢抓破不見膿水皮卷如豆殼者死痘漿靨寒戰咬牙手足搖動噤口不開者危急用人參黃耆白朮茯苓附子炮薑丁香肉桂收靨時痰壅喘急聲啞目閉者死目閉腹脹足冷過膝者死痘後同目無神光瞳子不明珠帶灰色者死痘後收結痂厚遲之三日自落者吉痂色光潤其瘢帶紅更無他症飲食如常者吉自食痘痂雖有他症任凶不凶痂落後雖不發熱而怠倦嗜臥不思飲食或手足冷或津液少而渴或瘢白不紅皆內虛也宜補中益氣湯三十不然惡變生他症補瘢紫痂落後瘢紅紫者毒盛血熱也用當歸赤芍白芷升麻桔梗連翹紅花紫草燈芯痘後逆症痂落而瘢雪白此因漿清痂薄氣血大虧也急用十全大補湯或四物湯加白朮陳皮紅花按瘢白甚以手拭過不見紅色此血不足也雖過月餘亦必死急用十全大補湯去茯苓加紅花重用白朮以手拭過稍紅者此氣不足也宜保元湯多服至瘢紅方止若怠緩不治必肌瘦食減而死面色青白神氣昏暗目無神光心腹疼痛不治眼睛吊白失智亡魂不省人事不治寒戰咬牙手搖足掉噤口不開者不治牙齦腐黑臭不可聞者胃爛也不治抓破穿肌遍身肉爛不治口鼻出蛔不止者胃絕也不治遍身大熱忽一日之內其痂盡落即發驚搐此毒入攻心也不治潮熱不退肌膚消瘦如柴者不治
