body:
  text: 卷五痘科諸方一加味升麻葛根湯粉葛升麻赤芍甘草桔梗防風去蘆尾蘇葉小川芎山楂肉牛子生薑引水煎熱服取汗二加味參蘇飲人參蘇葉小川芎桔梗全胡陳皮甘草茯苓粉葛法夏牛子山楂生薑水煎熱服取汗三敗毒和中散連翹牛子黃連酒炒枳殼防風荊芥桔梗紫草茸蟬蛻去頭足小川芎全胡木通升麻甘草麥冬大便秘者加酒炒大黃微利之不秘勿加四升消平胃散小川芎香附炒蒼朮紫蘇厚朴薑汁炒藿香砂仁陳皮去白炙草麥芽炒山楂生薑水煎帶熱服五參砂和胃散人參砂仁法夏白朮茯苓去皮藿香陳皮炙草煨姜去皮煎服六術苓調脾散白朮茯苓去皮白芍酒炒神麯炒炙草白扁豆薑汁浸去殼炒砂仁香附炒厚朴制煨姜大棗去核煎服或加人參七清解散防風荊芥蟬蛻桔梗小川芎全胡粉葛升麻黃芩酒炒黃連酒炒紫草木通牛子連翹山楂甘草生薑水煎溫服八蘇解散前方去芩連加紫蘇白芷羌活生薑水煎熱服九溫中益氣湯人參白朮生黃耆當歸身酒洗茯苓炙草川芎白芷防風南木香官桂山楂肉生薑大棗煎服中病即止十調元化毒湯人參生黃耆生白芍酒洗當歸酒洗牛子連翹黃芩黃連各酒炒防風荊芥桔梗前胡木通紫草茸酒洗紅花酒洗生地黃酒洗甘草蟬蛻山楂生薑水煎溫服腹痛去參耆加枳殼炒大便久秘去參耆加酒炒大黃微利之大便通仍除之若血氣與毒氣俱旺脈洪數者歸芍減三之一去參耆十一加減參蘇飲蘇葉人參陳皮小川芎羌活防風荊芥桔梗白芷甘草冬加麻黃生薑水煎帶熱服但不可出汗十二平和湯人參當歸桔梗白芍紫蘇黃耆防風白芷甘草官桂沉香檀香乳香藿香生薑水煎溫服十三姜附湯白附子老生薑濃煎服十四清毒活血湯紫草茸當歸各酒洗前胡牛子木通生地黃生白芍各酒洗連翹桔梗黃芩黃連俱酒炒甘草山楂肉人參生黃耆生薑煎服煩渴者去參耆加麥冬花粉酒炒十五參歸鹿茸湯鹿茸酒塗炙去毛酥炙恐其膻也嫩綿黃耆蜜炙當歸身炙草人參生薑龍眼肉煎去渣入好酒一杯能飲者藥汁與酒相伴和服十六千金內托散人參當歸身黃耆蜜炙酒芍大川芎官桂甘草炙山楂肉南木香防風白芷厚朴炒生薑龍眼肉水煎入好酒和服一方有桔梗十七參耆湯人參黃耆蜜炙甘草炙官桂生薑水煎溫服十八參麥清補湯人參麥冬去心花粉二味酒蒸曬乾生黃耆前胡牛子炒甘草生炙各半白芍酒炒生用各半當歸紅花生地黃各酒洗大川芎桔梗山楂生薑龍眼肉水煎溫服十九梔連二陳湯黃連梔子俱薑汁炒白茯苓製半夏陳皮去白甘草炙生薑水煎緩緩服吐止即勿服二十加味四苓散豬苓木通澤瀉赤苓車前略炒黃連黃芩俱乾炒牛子炒香研燈心一團水煎食前服二一參朮散白朮去皮人參茯苓去皮砂仁甘草去皮炙米仁炒家蓮子去心真神麯炒山楂肉肉豆蔻麵裹煨熟去面用火紙包打去油忌鐵訶子煨取肉去核廣陳皮去筋膜南木香共為極細末每用二錢清米飲調食前溫服兒有不肯服者入稀粥內和服二二七味豆蔻丸肉豆蔻訶子制俱同上砂仁南木香白龍骨煅赤石脂煅枯礬麵糊丸綠豆大每用清米飲下三十丸或二十丸兒有不能吞者將丸研碎入粥內服之二三歸耆湯當歸身黃耆蜜炒酸棗仁炒研水煎服一方加白朮茯苓一方加麥麩二四養胃開痰湯人參白朮甘草炙白茯苓山楂肉山藥炒家蓮子去心炒陳皮去白製半夏桔梗生薑水煎溫服渴者去半夏加麥冬北五味吐逆者加藿香砂仁二五建中湯人參蜜耆白朮當歸身大川芎大附子制乾薑炒黑肉桂炙草丁香生薑水煎溫服二六溫表調中湯蜜耆人參白朮茯苓官桂大川芎當歸身乾薑炒炙草防風白芷丁香附子生薑水煎溫服二七清表解毒湯地骨皮麥冬花粉酒炒牛子連翹當歸豬苓澤瀉酒芩木通甘草水煎溫服二八消毒散血湯牛子生白芍酒洗桃仁炒去皮尖研爛大黃酒炒紅花酒洗沒藥乳香俱用燈心同研細煎藥將熟投入乳沒略煎溫服二九大連翹飲連翹牛子柴胡當歸赤芍防風木通車前荊芥黃芩山梔各酒炒滑石甘草蟬蛻生薑煎服大便秘者另酒炒大黃三十補中益氣湯人參蜜耆白朮當歸身柴胡升麻川芎炙草陳皮渴加麥冬北五味生薑水煎溫服一方有茯苓無川芎陳皮三一玄參升麻湯元參升麻甘草防風荊芥牛子水煎溫服一方有紅花紫草黃芩無牛子防風三二參耆實表湯蜜耆人參炙草官桂防風白芷當歸川芎桔梗厚朴南木香生薑水煎溫服三三參歸大補湯人參當歸蜜耆川芎桔梗楂肉炙草防風白芷厚朴紫草茸南木香生薑水煎溫服三四四聖石膏珍珠豌豆俱燒存性亂髮灰冰片用油胭脂點成膏先將金銀簪撥開疔口將藥點入開轉紅活三五拔毒散雄黃研細胭脂浸濃水調點疔頭上即時紅活三六生肌散地骨皮黃連炒黃柏炒五倍子生甘草等分為細末乾摻之一方加枯礬三七綿繭散出蛾綿繭不拘多少以生明礬末填在內燒令汁盡成灰為末乾摻之一方加陀僧白芷減陀僧一半三八發灰散用少壯無病人亂髮不拘男女肥皂洗淨油垢氣又用溫湯洗淨肥皂氣入瓦罐內鹽泥封固木炭火圍泥罐一半煅一炷香久取出候冷研細每用二錢童便七分酒三分調服三九清肺湯花粉酒炒麥冬天冬酒蒸甘草桔梗當歸生白芍酒浸黃芩酒炒丹皮酒洗知母蜜炒生薑水煎服入發灰一錢調服尤妙四十清上飲薄荷防風甘草粉葛牛子連翹桔梗黃芩黃連花粉俱酒炒麥冬生薑水煎溫服四一赴筵散薄葉黃柏各等分為細末入青黛少許和勻摻之四二利咽解毒湯山豆根麥冬元參桔梗牛子防風甘草生薑水煎食後良久溫服每一煎分二三起緩緩服之四三玉鎖匙硼砂一錢朴硝五分殭蠶一條片腦五釐共為細末竹管吹之四四導赤散木通赤茯苓去皮麥冬車前微炒生地黃甘草人參燈芯一團龍眼水同煎飢時服四五清毒拔翳湯黃連酒炒當歸花粉酒潤牛子草決明桔梗甘草白蒺藜炒去刺甘菊花蜜蒙花穀精草木賊粉葛川芎羌活柴胡防風薄荷生地黃山梔酒炒生薑水煎食後良久服大便秘者加大黃酒炒服一二劑仍去之此方毒輕者不過十劑愈毒重者必數十劑乃效四六九味神功散人參黃耆甘草牛子紅花全胡生地黃紫草茸白芍各等分煎服四七十神解毒湯歸尾生地紅花俱酒洗丹皮桔梗赤芍大腹皮洗極淨薑汁拌曬木通連翹小川芎煎服此方與敗毒和中散可參用四八荊防解毒湯防風荊芥升麻黃芩黃柏俱酒炒元參牛子炒研水煎服四九鼠黏子湯牛子炒研當歸身炙草柴胡連翹酒芩黃耆地骨皮各等分煎服五十異功散人參白朮茯苓當歸陳皮厚朴製半夏木香丁香肉果麵裹煨熟去面去油製附子官桂加姜棗水煎服一方無附子有訶子煨取肉去核五一回生丹丁香九枚乾薑一錢水煎服五二八正散赤苓瞿麥萹蓄車前山梔木通滑石甘草燈芯煎服熱甚大便秘者加大黃五三無價散用無病小兒糞陰乾將傾銀罐二個入糞上下合定鹽泥固濟火煅通紅取出為末蜜水調服一錢一方加麝香冰片少許五四辰砂益元散滑石六兩辰砂三錢甘草一兩並水飛過每服一錢大人二錢燈芯湯下五五豬尾膏冰片一分半刺豬尾血一錢同研溫酒調服五六至六一並空六二清胃敗毒湯殭蠶丹皮甘草連翹生地桑皮沙參白茯金銀花黃柏蜜水炒體虛加白朮六三救苦散人中白火煅五分青黛飛過五分冰片一分白殭蠶一錢半寒水石井水飛過三錢黃柏錢半共為細末先以苦茶拭過隨搽患處富便之家加牛黃二分研入其效更速六四二聖散苦參三錢白殭蠶二錢共為細末吹入六五和中湯白朮酒芍防風白茯乾葛丹皮桔梗生薑紅棗煎服六六至七一俱空七二保胎方歸身去尾真川芎白茯川續斷杜仲薑汁炒玉竹酒芩白朮甘草七三宣毒透疹湯乾葛前胡芥穗防風連翹牛子枳殼木通桔梗酒芩薄荷甘草去皮淡竹葉燈芯引如口糜爛加熟石膏七四清毒保目湯柴胡連翹梔仁酒芩芥穗防風赤芍牛子蟬蛻十二個如有閏十三個當歸甘草川芎升麻薄荷桔梗燈芯水煎七五蟬蛻豬肝散兔屎八枚蟬蛻二十四個去頭足煎沸入公豬肝七尖切薄片煎熟先飲湯後食肝若得黑褐羊肝更妙七六空七七清熱導滯湯歸身山楂白芍檳榔厚朴枳殼陳皮連翹牛子酒芩黃連酒炒木香研末甘草去皮生薑引可加熟大黃少許七八補氣養胃和中湯白朮人參廣木香炙草去皮白茯陳皮扁豆炒山藥炒家蓮子去心砂仁煨姜陳老米七九朱敗毒散生地丹皮柴胡桔梗薄荷連翹牛子黃柏蜜炒花粉酒芩元參赤芍金銀花甘草去皮石膏淡竹葉燈芯煎再用犀角磨水和服八十空八一加減清毒撥翳湯生地甘菊歸尾川芎柴胡紅花草決明木賊白蒺藜黃芩牛子連翹生甘草去皮八二甘露迴天飲沙糖半盞百沸湯調作一碗溫服八三三豆漿黑豆綠豆赤小豆各一合以酸醋浸脹搗研濃漿時時以鵝翎刷之或為末醋調敷之名三豆散八四張調元解毒湯人參生耆當歸連翹牛子防風川芎升麻黃芩黃連前胡木通炙草蟬蛻八五二寶散犀角玳瑁磨水服八六犀角地黃湯赤芍生地丹皮等分水煎犀角磨服無犀角以升麻代之亦可八七扶元祛風湯人參白朮茯苓甘草當歸川芎羌活防風天麻蟬蛻全蠍殭蠶木香鉤藤生薑引八八清肺飲麻黃麥冬知母花粉荊芥訶子桔梗元參竹瀝薑汁八九甘桔湯甘草桔梗牛子荊芥元參九十定心散滑石飛過甘草牛子木通車前辰砂研細燈芯湯調服九一鎮驚丸天竺黃膽星天麻防風甘草殭蠶全蠍花粉礞石煅琥珀共為末硃砂辰砂二味一半入藥一半為衣作丸龍眼大燈芯湯磨金銀為引九二六一散滑石甘草辰砂木通為末燈芯湯調九三清神散火湯木通車前麥冬元參黃連甘草梔子燈芯加辰砂煎服大便秘者加酒大黃弱者加人參九四粉紅丸膽星天竺黃辰砂胭脂米為末作丸生薑薄荷湯下九五敗毒散升麻乾葛紫蘇川芎防風荊芥前胡桔梗枳殼牛子連翹蟬蛻山楂木香白芷地骨皮一方去乾葛加紫草九六芍藥防風湯白芍陳皮升麻防風桔梗川芎枳實厚朴牛子九七大黃化毒湯白芍厚朴陳皮酒大黃煎九八正氣散藿香陳皮半夏紫蘇大腹皮厚朴茯苓木香白芷山楂神麯炙草白芍九九雄黃解毒丸雄黃盆金巴霜共為末米糊丸如米大好酒下一百張梔連二陳湯陳皮桔梗茯苓花粉黃連黑梔瞿麥木通百一四苓散白朮茯苓豬苓澤瀉百二調脾散白朮茯苓白芍神麯炙草香附厚朴木香砂仁蓮肉訶子肉苡仁山楂肉豆蔻麵煨去淨油陳皮虛甚者加人參百三九味丸白朮茯苓豆蔻制見上訶子煨取肉砂仁木香龍骨煅赤石脂煅枯白礬共為末米糊丸百四黃連解毒湯黃芩黃連俱酒炒枳殼歸尾紅花酒大黃甘草百五和中湯人參當歸枳殼陳皮木香甘草百六調胃承氣湯枳殼酒大黃檳榔甘草姜引百七芩連湯芩連俱酒炒當歸川芎甘草木香赤芍冬加升麻百八香連丸川連吳茱制木香為末醋糊丸米飲下百九潤湯丸歸尾生地麻仁桃仁甘草百十調元解毒湯黃耆當歸牛子連翹黃芩花粉生地木通前胡人參甘草百十一見三十百十二加味升麻湯升麻防風桔梗川芎陳皮牛子連翹山楂柴胡蟬蛻赤芍甘草木通百十三解毒湯連翹牛子枳殼木通防風桔梗紫草川芎升麻蟬蛻黃芩黃連前胡麥冬甘草百十四導赤解毒湯木通車前生地門冬甘草茯神石菖梔子人參燈芯百十五安神丸牛黃黃連當歸梔仁共為末入豬心血和為丸硃砂為衣燈芯湯下若無牛黃則加川貝膽星琥珀百十六寧肺散知母牛子桔梗陳皮馬