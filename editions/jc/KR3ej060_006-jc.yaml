白朮茯苓當歸陳皮半夏肉桂山楂附子乾薑痘有水泡者多用白朮茯苓百八三清金導赤飲當歸白芍陳皮石膏茯苓炙草黃連山楂桑白皮木通枳殼滑石車前麥冬人參元參百八四見百卅八百八五桂枝解毒湯桂枝麻黃赤芍防風炙草桔梗川芎牛子人參生耆百八六甘露解毒湯白朮茯苓澤瀉木通麥冬生地連翹官桂香薷百八七當歸解毒湯生地當歸麻仁牛子紫草枳殼大黃酒浸或加連翹百八八見三六百八九大補湯黃耆人參當歸官桂牛子連翹甘草茯苓百九十升麻解毒湯升麻白芷炒芩牛子連翹蜜蒙花荊芥防風蒺藜當歸甘草節木通節加黃耆百九一清金解毒湯黃芩黃連牛子前胡丹皮麥冬知母百合黑梔甘草人參百九二苦參丸苦參黑梔防風枳殼元參獨活黃連黃芩大黃菊花等分蜜丸每酒下五十丸百九三花蛇酒白花蛇去首置酒罈中封口煮俟數日退火毒服酒並蛇百九四一掃光銅綠白礬大黃樟腦硫黃川椒膽礬倍子白芷水銀錫等分為末另將錫溶化入水銀攪勻後入諸藥末豬油調敷百九五蠶蛻散枯礬人中白煅倍子蟬蛻燒蛇床子共為末百九六見百四百九七百九九俱空二百見百五二百一仙方活命飲白芷防風乳香沒藥連翹山甲赤芍歸尾貝母花粉金銀花皂刺陳皮二百二疽癤方三豆散見八十三一方用豆心渣敷之鐵箍散用樹上百足蟲新瓦焙為末油調敷之其蟲腹下盡足其背殼硬跌下地即首尾交合如環其大如指長寸許芙蓉膏用芙蓉花或葉或皮或根黃荊子等分共搗爛雞蛋白調敷留頂連敷二三次立效必勝膏用馬齒莧搗汁豬脂石蜜共熬膏敷之紫花地丁擂酒服或搗爛敷黃豆姜蔥共搗爛敷如意散用生南星八錢生半夏生大黃各一兩鬱金薑黃白芷蒼朮各五錢共為末醋調敷沖和膏紫荊皮炒五兩獨活炒五兩赤芍炒二兩白芷一兩石菖蒲一兩半共為末醋調敷內服六君子湯加北芥子二百三膏藥方防風商陸連翹生柏生芩花粉苦參赤芍羌活獨活川烏蛇床子麻黃何首烏皂刺生南星生半夏白芨山甲草烏木鱉紫草紅花蛇蛻大戟各一兩桐油三斤納諸藥浸一宿熬至藥渣枯浮用棕濾過再將乳香沒藥石脂銀硃各三錢血蠍兒茶輕粉各三錢龍骨煅水粉各一兩黃丹十二兩共為細末看油滴水成珠漸漸入此藥末攪勻二百四洗肝散川芎歸尾羌活防風薄荷梔子赤芍紅花菊花膽草甘草飯後服眼痛加蔓荊子石膏穀精草綠豆有翳膜加蟬蛻白蒺藜木賊石決明蒙花大便熱結者加大黃黃連牛子小便短赤者加車前木通滑石眼紅赤者加生地丹皮二百五拔雲散防風羌活黃芩黃連白芷甘菊荊芥膽草石決明草決明石膏蒺藜又蒙花散蒙花石決明蒺藜木賊羌活為末清茶調服二百六羌菊散羌活菊花膽草穀精荊芥薄荷蔓荊子梔子連翹赤芍生地黃芩黃連有翳加蒺藜決明二百七膽草散膽草甘菊蒺藜白芷防風黃連蟬蛻木賊梔子二百八兔糞散兔糞炒黃為末蟬蛻木通甘草水煎二百九兔糞丸兔糞炒四兩石決明煅草決明白芍各一兩當歸防風穀精蒺藜各五錢薄荷四錢為丸荊芥湯下二百十涼肝明目散當歸膽草蒙花柴胡川芎防風川連和豬肝煎二百十一望月散望月砂一兩蒙花蟬蛻穀精各五錢用豬肝切開每肝一兩入前藥末一錢包肝內煮熟肝汁並服二百十二祛風明目散防風荊芥川芎薄荷生地紅花連翹白芍菊花蒙花穀精覆盆子蔓荊子川椒生薑引發時連服數劑二百十三四灰散舊棕老杉樹皮胎髮臍帶燒灰存性一方無臍帶名三灰散二百十四涼血地黃湯當歸川芎白芍生地白朮升麻川連甘草人參梔子元參阿膠加棗二枚二百十五涼血解毒湯當歸白芷升麻紅花紫草赤芍桔梗連翹牛子燈芯二百十六柳花散紫草升麻當歸赤芍共為末每服七錢葡萄煎湯下二百十七逍遙散白朮茯苓當歸白芍生地甘草柴胡加丹皮梔仁名加味逍遙散二百十八瀉肝散羌活當歸梔子膽草川芎防風炒芩柴胡木通淡竹葉二百十九當歸養心湯人參當歸麥冬生地炙草加燈芯引二百二十調元內托散人參黃耆肉桂木香當歸川芎白芍附片二百廿一罩胎散當歸川芎白芍人參白朮茯苓柴胡甘草條芩防風荊芥白芷乾葛砂仁紫草阿膠桔梗二百廿二八物湯人參黃耆白朮當歸川芎白芍熟地甘草二百廿三安胎散川芎當歸白芍人參白朮茯苓黃芩甘草砂仁陳皮阿膠香附艾葉等分二百廿四黑神散當歸川芎熟地薑炭桂心蒲黃木香陳皮黑豆炒香附炒水酒各半煎服二百廿五敗草散牆上多年敗草研末敷二百廿六瀉黃散藿香葉梔子石膏防風甘草蜜酒拌微炒水煎溫服二百廿七胭脂塗法先以升麻煎濃湯去渣用胭脂於湯內揉出紅汁以木綿蘸湯拭之加雄黃更妙二百廿八加味保元湯人參黃耆甘草歸尾赤芍紅花黃芩黃連牛子連翹升麻防風荊芥水煎入燒人糞一錢調服二百廿九百花膏蜂蜜不拘多少略用湯和以鵝翎刷之二百三十竹葉石膏湯石膏知母麥冬甘草竹葉二百三一羌活防風湯羌活防風川芎梔子膽草當歸甘草薄葉淡竹葉水煎溫服二百三二四順清涼飲當歸白芍大黃甘草二百三三空二百三四麥門冬湯麥冬人參乾葛赤芍赤苓升麻甘草石膏二百三五見五十二百三六柴葛桂枝湯柴胡葛根桂枝甘草防風人參白芍各等分姜引製藥聶降炎上之火清血分之火俱有寒因熱用之義凡痘中前後所用解毒諸寒藥俱因毒火燥血分故芩連梔柏大黃花粉等味必用酒拌濕炒燥牛蒡子必炒香研碎歸芍生地紅花紫草丹皮地骨之類必以酒臨時洗用此要法也不明此義為害不淺
