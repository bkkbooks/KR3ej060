body:
  text: 金敘甚哉為人子者不可不知醫斯言所以教孝也余由是觀之則為人父者亦不可不知醫何也小兒素稱啞科難以臆度而又是專科者類多庸劣求其良者百不得一即如痘疹之發其顯然易見者耳由初熱而現點而灌漿收靨有形色可占有時日可計較諸他症宜易以為功而往往補瀉殊施虛實莫辨吉凶罔知趨避先後多所貿亂者則其術有未精而所以治之者失其道也為人父者不知醫又不知所以擇醫以彼嬰孩供其荼毒鞠育乖方咎將誰屬與言及此竊為寒心文子夢弼起者湘南文學也自其少時攻舉子業恂恂謹厚潛心經史旁及諸子百家之書無不通曉屢躓棘闈乃棄而肆力於醫窺東垣丹溪之堂奧衍河間潔古之薪傳以此活人選輒獲效惻然念小兒一科惟痘疹為生死關頭所繫尤重爰取清江聶氏活幼心法一書沉潛反覆得其宗旨參以玉堂定論張氏新書兼綜條貫明白無疑由是匯成一編袖以質余披閱之見其詳求乎寒熱虛實之辨指陳乎吉凶順逆之機無症不備有方必搜雖未嘗別出新裁直抒己見而抉擇去取之間卓有定識非精於斯道者固不能若是也顏之曰痘科輯要即令付諸剞劂以公同好且以告天下之為人父者時嘉慶六年辛酉歲秋九月穀旦年家眷同學弟金方世拜題
