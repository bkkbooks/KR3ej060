front:
  text: 自序漢建武二十五年馬援徵武陵蠻軍次下雋士卒死者大半史以疫書蓋即痘也痘其始於此乎治痘之法如劉河間錢仲陽張潔古王海藏陳文中朱丹溪皆卓卓名家迥殊庸劣然而劉錢張王失之瀉陳氏失之補丹溪操中立之術補瀉兼施又失之牽制而權不歸一他如保赤全書證治準繩舛謬已甚金鏡錄痘科正宗痘疹心要會編等書非無一節之長究之得不償失獨有明清江聶氏著活幼心法一書以為胎毒藏於命門觸之即發可內托而不可清解闡千古之秘奧救萬世之嬰孩其功偉哉顧其立言高渾方法簡約留心斯道者能精思其義觸類引伸固可用之不竭若淺學之士因症檢方或不免少之見存本朝朱玉堂先生痘疹定論意在表章江聶氏仍略而不詳張氏之種痘新書詳矣其文辭又多重複冗漫讀者不能一目瞭然用是不揣固陋於聶與朱之略者詳之於張之繁衍者刪之張亦間有未備者採他書補之語取其簡而括義取其精而顯方取其平易而當臨病檢書可得治法聊為粗工開一捷徑知我罪我所不暇顧嘉慶六年歲次辛酉仲秋月上浣衡山文起夢弼書於築岩草舍毛序世有得秘傳方書而什襲藏之者設為一身一家所得矣然私而不公識此當恨焉夫賢人君子不為良相必為良醫既為良醫本其一生之精思稔諸書日所診治以筆之於書蓋欲濟天下後世也得其書者秘而不傳非徒負作者苦心其視患者呻吟望求而不加憐惜居心亦太忍矣倘以己所珍重者與世人共寶之則人皆有術以扶危拯困起死回生而庸夫之諉於天命者不足辨也痘疹之厄嬰兒委命於父兄父兄授權於醫稍有不慎即殺諸俄頃醫殺之實父兄殺之也苟得善本留心研究明乎虛實寒熱之症升解補瀉之方臨時自有主張何至挈嬰兒之命付諸庸醫之手金君竹均家藏痘疹輯要一書乃其尊人菊圃先生秉鐸衡山時秀才文君夢弼所輯菊圃先生序而梓之者也每遇時行險症醫者束手病家失措本是書辨症用方多所全活可知天命之說不足憑而醫不能無誤矣原版漫滅已久書罕存者竹均欲以所藏公諸宇內為業醫者授以指南為出痘者予以寶筏乃謀諸同志捐資重刊皆欣然稱善旬月間捐得若干金遂命開雕月餘工竣既屈君自申袖痘科秘傳見亦云抄自粵東並無刻本亦不著作者姓字自得是篇所求甚夥蓋與輯要合夢璧乎展卷讀之辨症施治剖晰詳明與輯要並行不悖詳加決擇撮其論著最精者每篇別為續集又採諸方附於卷末是書也成兼能家置一冊為活幼慈航則不知醫者亦不至為庸醫誤可慰著書者保赤婆心而二君公善之誠眾君子樂善傾助並委不朽矣道光九年歲次己丑仲夏月上浣長沙毛鵬謹識
