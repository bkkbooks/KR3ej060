body:
  text: 續集驗形察色形乃氣之充色乃血之華痘之輕重由氣血有盛衰氣血之虛實辨於形色之善惡初出時點若蚊咬滯而不起雖起塌闊皮薄而軟斜視若無面唇先腫小者稠密大者平陷此皆氣虛形重也小而高聳根斂圓淨先出先脹日見活動光潤不燥堅實礙指頭面稀疏飲食不減此皆氣旺形輕也見點之初頂若火刺紅而乾枯紫而昏暗夾斑帶疹白而枯澀黑若塵鋪此皆毒滯色重也初出淡紅漸覺明亮四五日頂若水白根窠紅潤此皆血活色輕也淡紅一線緊附於根下而無走散之勢者吉血雖依附根腳紅色隱隱出部者險痘與肉色不分平鋪散漫者凶氣虛則頂陷氣散則塌陷血虛則暈必枯血離則根必散根窠者血之暈膿者血之腐六日以前專看根窠無根窠必不灌漿六日以後專看膿色無膿色必難收靨頂白根紅氣血分也四五日不分後必作癢頂充根附氣血交也六七日不交後必有變深紅壯熱疔將發也四五日前宜清五六日後宜補氣血之分清濁之本乎上下也氣血之交陰陽之互為依附也當分不分毒結之也當交不交毒隔之也加升麻散郁何患不分知清熱解毒何患不交色太淡而灰白此血衰氣滯也急宜補血行氣太紅而乾枯此血熱毒盛也急宜涼血解毒若失於清利必變焦枯紫黑而成氣血凝滯之症何以化水成漿一見焦紫黑陷須用滂沱飲若肚腹膨脹大渴大熱煩躁發狂五六日不大便此表裡實熱也非下之不救斟酌可也滂沱飲石膏黃芩胡黃連山梔蘆根知母木通枳殼銀柴胡犀角治血熱壅遏有五法表熱盛則痘乾枯表太涼則冰伏內熱盛則秘結內太涼則泄瀉氣壅盛則腹脹喘滿熱毒為所抑而不得伸越毒氣彌盛則表裡受重嬰兒難當故治痘之法在安表和中勻氣透肌解毒五者而已安表使無干枯冰伏之患和中使無便結泄瀉之變勻氣使無壅盛喘滿之禍透肌使熱毒得以伸熱而達表解毒使內外有所分消五者不失血熱壅遏之症勢難綿密不足憂矣
