body:
  text: 卷四異痘類天根痘生諸痘不起灌惟天庭太陽起灌天庭為諸陽之首此處起則陽氣必旺余亦將漸次起矣十有九生天空痘死諸痘雖起惟天庭曉星不起此陽氣虧也必死明朗痘生諸痘不起灌惟太陰太陽起灌太陰太陽乃日月光華之地二處起灌則血氣俱盛其後諸痘必起明蝕痘死諸痘皆起惟太陰太陽不起日月當明而不明如天狗之蝕焉此氣血兩虧後來諸痘必不能運化海溢痘生諸痘不起而耳後方圓一寸獨起此處屬腎名星宿海海既充溢則腎旺精足可知海枯痘死諸痘皆起惟耳後方圓一寸不起若不調元補腎必變唇裂齒崩死有根痘生地角方圓其痘起脹明潤如珠十有十全此腎足也腎為人之根本故曰有根無根痘死諸痘雖好惟地角乾枯不灌或灰白塌陷此腎水絶也抱鼻痘陷面部雖稀而鼻梁左右密如蠶種此毒聚於脾胃也單鎖口雙鎖口危嘴角有黑痘一粒獨大名單鎖口兩嘴角俱有名雙鎖口皆惡候也主不食死見此即宜剔出惡血以拔疔散三十五敷之或可救此毒聚於胃也鎖項托頤危遍身俱稀惟頸項稠密如蠶種不分界地名鎖項竟至於頤者名托頤主飲食不進聲啞死蓋頸項為陽道上升之要樞毒凝於此則陽不能升焉有不死豬頸痘險痘出喉窩及頸窩甚多名豬頸主喉痛咽爛死急用豆根元參桔梗甘草生地川芎歸尾木通牛子與服緩則毒結於喉必難治也兩頭痘險自胸以上自臍以下俱有痘而中間一截全無此氣血不能貫通於上下腰臍之間寒毒凝滯若不急治七日後必變灰白見點之時急用生耆當歸赤芍桔梗防風厚朴續斷白芷山楂木通入黃豆三十粒服此中間有痘乃可救按此即斷橋症也逆痘生上身痘少下身痘多或從下身先出升漿收結俱先下身此雖出於常數之外其實無妨鬼擺痘死通身無點粒各處一片紅青狀若打傷七八日內必死鬼痘險手足胸背俱多而頭面全無其痘如鬼不敢見於陽道也又名無頭痘此氣血不能上升急於五日之內提氣上行令頭面略見點粒或可救不然諸痘雖出亦難起灌即痘無虞其後必主曲池生毒見骨而死若四肢胸背俱稀者不在此例治法用升麻川芎白芷防風羌活前胡生耆當歸桔梗甘草筍尖生薑引賊痘死初出如緑豆過一日大如黃豆再一日大如龍眼其大甚速根窠與頂全無血色雖起脹而按之虛軟痘中有此為閉毒之症後必上下失血死又有一種於將熱之時或初熱一二日間天庭太陽忽見標數點大如赤豆光亮好看過一二日即收沒猶之賊欲攻城陷地先命一二細作探其虛實名曰賊標此標既沒隨發大熱遍身之痘必如鋪氈蠶種不可救療凡見此痘俱急用銀針剔破去其惡血以拔毒散三十五敷其口或可救蛇皮痘死頭面遍身俱無空地狀若蛇皮必乾枯不能作漿至十二三日死張遜玉曾治此症先用解毒次用補托竟獲安痊但必猛攻不可觀望藥患痘險初標紅潤至七八日忽變陷伏此必其人氣血虛弱而毒又盛庸醫見其初標紅潤玩忽不治或審證未明誤投藥餌九焦痘死天庭地角右顴左顴耳後胸背手足九處皆有一二點黑陷焦枯是也伏陰痘險痘不灌漿而瀉膿血此毒氣陰伏於內不能升發於外十一日死早於七八日上溫中內托或猶可救空倉痘死善治亦可救痘雖肥滿內實幹枯全無血水硬者名鐵殼空倉此等症其氣雖盛其血必虧或從前失於解毒致毒火內熾其血愈涸治法見灌漿險症石臼痘死其痘四弦起而中窩雖明亮好看內無膿漿摸之其硬如石此毒凝於表血涸於中不可治也茱萸痘險其痘不甚起脹四弦起而中略陷頂有亂紋形若茱萸後必空漿倒陷死此毒氣盛中氣又虛故痘頂有紋不尖圓也張遜玉治一兒用川芎升麻生耆赤芍牛子連翹黃芩黃連蟬蛻白芷甘草煎服外以水楊柳洗之連進數服茱紋乃除後以補氣為君補血為臣竟愈凡治此症必解毒行氣蟲痘險蠅吮其汁痘內生蛆癢甚用針挑去蛆蟲治法見收結險症血痘死初出血點其色紅紫七日內必死又遍身如硃筆點者內根已腐外苗必萎必無生理血泡痘險痘泡通紅其內是血此血熱毒熾不能運化成漿急宜涼血清毒用生地赤芍紅花紫草丹皮牛子黃芩白芷弱者加人參身熱加全胡聶云此氣虛也大補其氣泡即轉白詳見首卷氣血篇按真血熱症痘必枯焦帶紫黑色甚至遍身無痘處亦不紅活而紫血靨痘又名珍珠痘甚佳痘出稀少四五日胖如黃豆七八日帶血而靨十日落痂痂若明珠此氣血充足而毒又輕故隨出隨結不及釀膿也此痘百無一凶且主貴白漿痘險痘初起即有白漿其後必灰白癢塌蓋漿由腳起乃為順今毒參陽分陰血不能運化不久即陷伏也初起間有數點即刺去其漿旋有此者又刺之時時瞻顧不可怠玩內服千金散大補氣血可保無虞若遍身如此則難治矣四圍痘死痘出後四圍又生小痘攢簇本痘後必串成一痘為水泡不可治也此症僅見於手足者無妨遍身如此必不可救漏痘險痘未成膿頂上有孔漏出汁水堆結形若癩頭俗呼漏瘡此表虛不能養漿急宜補氣健脾固其肌肉治法見灌漿逆症蛀痘險痘有小孔針嘴大如蟲蛀之狀此腠理不祕大泄元氣不急治必灰陷死用人參炙耆當歸炙草桂心丁香加荔枝引必孔祕痘乃起脹行漿也按此症與漏痘略同琉璃痘又名隱血痘危痘雖光亮全無血色形若琉璃略擦即破內俱清水或出血總無膿漿此氣血不能運化毒氣也後必音啞死急取其尤者刺去其水再用實漿散百七三加黃豆四十九粒赤萍紫萍白萍皆死痘出後形若浮萍連片虛浮不分顆粒又無起脹之勢其色赤者名赤萍紫者名紫萍白者名白萍草尾珠生遍身俱陷惟尻骨一圍飽滿潤澤其明如珠此必腎足精充急用內托之劑則遍身之痘俱起矣黑痘死痘毒隨血出毒盛血熱故其痘黑此必死之症古方雖有數條總以涼血解毒為主姑載於後初見黑點在皮膚之間者用硃砂冰片牛黃或用豬尾血調人牙散好酒同服初出點便黑者用紫草茸二三錢好酒調服又皮膚髮青紫紋者用紫草一錢紅花荊芥防風牛子生耆各八分甘草三分升麻五分木香三分黑痕並黑靨者用蟬蛻五個紫草茸一錢黑如煤炭血不紅活用紫草紅花生地牛子赤芍黑而軟者氣弱血熱也用參耆實表湯三十二加紅花紫草生地焦黑潮熱煩躁者用小無比散百四五加紫草生地紅花磨犀角調服氣血兩敗痘死近看形如水蓼花遠望胭脂甚可誇臨漿清水無膿汁古聖名醫束手嗟復出痘險有等痘出甚稀依然起漿收靨究竟皮膚之內有痘未出靨後頤下發毒死此由元氣虛弱不能送毒故也凡痘出稀者須要捻子照之若皮下隱隱有點是痘未盡出急與千金內托散六十托出其痘方可無虞云翼子二十八般怪痘丹云繞頂遍身痘俱好惟頭頂一片通紅此虛火上炎也宜滋陰降火通利小便則火氣下行矣紫雲貫頂遍身痘好但頭頂一片焦紫陷伏此毒凝陽分陽氣莫升不久皆陷伏也若不焦紫乾枯則非此症頭為純陽足為純陰凡痘之起脹必下至足頭乃行漿收靨亦然烏紗覆頂頭上一片黑痘連皮膚俱有黑氣此元陽將脫也不治梨花幔頭頭上一片白陷此元陽虛也急用保元湯加肉桂附子鹿茸川芎或可救霞掩天庭遍身之痘磊落光明惟天庭一片俱是血泡連皮都紅此心經蘊熱急宜清心解熱以犀角黃連麥冬連翹加豬心血與服紫萍鋪額額上之痘形若紫萍此心經熱毒之甚其人悶亂不寧若諸部痘好用小無比散百四五外加元參升麻犀角與服或可救烏紗蓋額大庭額顱俱是黑痘兼見黑氣不治灰撲印堂印堂之痘有灰色此心經血虛宜千金散十六加豬心血服紅紗拂面滿面雖分顆粒但點子紅若硃砂人皆以好痘孰知此由血熱大甚若不急治將變紫矣宜涼血之劑楊花拂面滿面之痘俱白色不起此氣血面虧也宜千金內托散多加鹿茸或加附子赤紗繞唇唇若塗朱或硬裂此脾經熱甚也宜清脾胃之毒烏飯沾唇唇皆黑痘或黑色必死霞錦鋪胸心胸一片紅色如霞痘無顆粒此心經毒火散漫不治紫雲布胸症與上略同但其色紫其死更速黑棋排胸胸前盡是黑痘三日內死楊花飛胸胸前盡是白痘全無紅暈此心經血虧失治必轉灰陷急用參歸鹿茸湯加豬心血桃花映背背上痘稠密而淡紅其紅散漫界地不分此心經火毒未清也急用元枝白芍川芎丹皮紅花連翹麥冬生耆甘草否則不能成漿此症宜側睡正臥則背上之血不行紫萍浮背背上之痘若浮萍其色紫此毒盛而腎氣又虛宜調元化毒湯十去防風荊芥加豬尾血效則可救黑砂滿背背上盡是黑點不治云鋪魚背滿背清黑如雲痘若魚鱗此氣血已枯毒氣又盛必死赤鱗穿腹腹上痘密如鱗其色紅此脾胃火毒宜人參白虎湯加丹皮生地黑緞纏腹腹上連皮及痘俱黑必腹脹音啞死白黎落地痂薄色白遍身痂痕俱無血色此氣血兩敗也急用十全大補湯加鹿茸否則半月後必發驚死葡萄落地痘前痘後忽然片片青紫若葡萄者兩日必死爛粟居臀遍身痘好惟臀及髓尾如粟之叢臭爛難聞此下元虛也宜大補湯榴花遍野諸痘俱好惟四肢紅紫唇口如朱或硬裂此脾肺熱盛也宜赤芍生地紫草牛子石膏甘草桂枝黑珠遍體遍身痘盡枯黑手足如柴灰命在旦夕楊花發枝諸痘俱好惟手足灰白宜用人參鹿茸白朮黃耆丁香附子當歸肉桂桂枝炙草煨姜朱氏逆症十三條矇頭一也面部身上及手足俱稀疏獨頭上至髮際形若蠶種此逆症也若稠密有地界又當別論蓋面二也他處稀疏獨面上形若蠶種無絲毫空處此逆症也若稠密有地界又當別論托腮三也他處俱稀疏獨兩腮頰及地角相連一片形若蠶種此逆症也若稠密有地界又當別論鎖項四也他處俱稀疏獨項間形若蠶種此逆症也若稠密有地界又當別論雲錦鋪胸五也他處俱稀疏獨胸前一處上連咽喉之下下及兩乳之上形若蠶種此逆症也若稠密有地界又當別論雲錦鋪肩六也他處稀疏獨兩肩及後頸窩形若蠶種此逆症也若稠密有地界又當別論前後補服七也他處俱稀疏獨心窩之下肚臍之上背脊鳳翅骨之下脊後腰之上前後如職官穿補服樣或方或圓形若蠶種此逆症也若稠密有地界又當別論斷橋八也他處俱稠密不分地界獨腰間周圍不見痘粒猶橋之中斷此逆症也若上下別處所出之痘有地界又當別論蝦蟆瘟九也遍身上下痘出稠密不分地界獨胸腹之間不見痘粒如蝦蟆形狀此逆症也若稀疏又當別論無根十也通身上下俱稠密不分地界獨兩手心兩足心無痘手足為諸陽之本陽絶故無痘此逆症也若通身稀疏又當別論枯樹掛蛇十一也有單掛有雙掛有掛在手肱者有掛在腿股者他處俱稀疏獨掛處如蛇形纏繞密如蠶種此逆症也若稀疏有地界又當別論玉帶橫腰十二也他處俱稀疏獨腰周圍密如蠶種闊不過二寸如帶之纏此逆症也若稀疏又當別論形如瓜瓠十三也痘初見標尚未出齊及將出齊之際痘未見起發而面部腮頰及兩目俱腫脹形如瓜瓠因毒氣內盛先攻脾肺此逆症也煩躁頓悶昏沉不省人事者決不可救水痘赤痘水痘全是水泡毫無膿漿赤痘初出形色微赤亦水痘之類也二痘初起亦發熱頭疼嘔吐即出後一二日間即結薄痂此由脾肺濕熱外感風寒而發也
